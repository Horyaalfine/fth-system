<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT Harlesden — Management System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e2e0d8;
  --border2: #d0cec4;
  --text: #1a1917;
  --text2: #6b6960;
  --text3: #9e9c94;
  --accent: #2d5be3;
  --accent-bg: #eef2fd;
  --accent-text: #1a3a9e;
  --success: #1a7a4a;
  --success-bg: #e8f5ed;
  --warning: #8a5a00;
  --warning-bg: #fef3d8;
  --danger: #b92020;
  --danger-bg: #fdeaea;
  --purple: #5c3db5;
  --purple-bg: #eeebfb;
  --teal: #0d7a62;
  --teal-bg: #e2f5f0;
  --amber: #8a5a00;
  --amber-bg: #fef3d8;
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

/* ── LAYOUT ── */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; bottom: 0; left: 0; overflow-y: auto; }
.main { margin-left: 220px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.content { padding: 24px; flex: 1; }

/* ── SIDEBAR ── */
.sidebar-brand { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
.brand-name { font-size: 15px; font-weight: 600; color: var(--text); }
.brand-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.branch-switcher { padding: 10px 12px; margin: 10px 10px 0; background: var(--accent-bg); border-radius: var(--radius); border: 1px solid #c5d3f8; }
.branch-switcher label { font-size: 10px; color: var(--accent-text); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 4px; }
.branch-switcher select { width: 100%; background: transparent; border: none; font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--accent-text); cursor: pointer; outline: none; }
.nav-section { padding: 10px 10px 0; }
.nav-label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; padding: 0 6px; margin-bottom: 4px; margin-top: 8px; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 400; transition: all 0.15s; margin-bottom: 2px; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.sidebar-footer { margin-top: auto; padding: 12px 10px; border-top: 1px solid var(--border); }
.user-chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius); }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.av-purple { background: var(--purple-bg); color: var(--purple); }
.av-blue { background: var(--accent-bg); color: var(--accent-text); }
.av-teal { background: var(--teal-bg); color: var(--teal); }
.av-amber { background: var(--amber-bg); color: var(--amber); }

/* ── TOPBAR ── */
.page-title { font-size: 16px; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
.badge-purple { background: var(--purple-bg); color: var(--purple); }
.badge-blue { background: var(--accent-bg); color: var(--accent-text); }
.badge-teal { background: var(--teal-bg); color: var(--teal); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-gray { background: var(--surface2); color: var(--text2); }
.badge-success { background: var(--success-bg); color: var(--success); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-danger { background: var(--danger-bg); color: var(--danger); }

/* ── CARDS / METRICS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
.metric-label { font-size: 12px; color: var(--text3); font-weight: 500; margin-bottom: 6px; }
.metric-value { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 5px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.card-title { font-size: 14px; font-weight: 600; }
.two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; margin-bottom: 20px; }

/* ── TABLES ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text3); padding: 8px 12px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.id-code { font-family: var(--mono); font-size: 12px; background: var(--surface2); padding: 2px 7px; border-radius: 4px; color: var(--text2); }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn-primary { background: var(--text); color: var(--surface); border-color: var(--text); }
.btn-primary:hover { background: #333; }
.btn-danger { background: var(--danger-bg); color: var(--danger); border-color: #f0b0b0; }
.btn-danger:hover { background: #fbd5d5; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 5px; width: 28px; height: 28px; justify-content: center; }

/* ── FORMS ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 500; color: var(--text2); }
.field input, .field select, .field textarea { border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; font-family: var(--font); font-size: 13px; background: var(--surface); color: var(--text); outline: none; transition: border 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,91,227,0.1); }
.field .hint { font-size: 11px; color: var(--text3); }
.form-actions { display: flex; justify-content: flex-end; gap: 8px; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 16px; }

/* ── MODALS ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.modal-lg { max-width: 720px; }
.modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-body { padding: 20px; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── TOAST ── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; animation: slideIn 0.2s ease; display: flex; align-items: center; gap: 8px; min-width: 240px; }
.toast-success { background: var(--success-bg); color: var(--success); border: 1px solid #a3d9bc; }
.toast-error { background: var(--danger-bg); color: var(--danger); border: 1px solid #f0b0b0; }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── SEARCH / FILTERS ── */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input { width: 100%; padding-left: 32px; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }

/* ── MISC ── */
.section-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.section-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.dot-green { background: var(--success); }
.dot-red { background: var(--danger); }
.dot-amber { background: #e09400; }
.empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
.empty-state p { margin-top: 8px; font-size: 13px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.row-actions { display: flex; gap: 4px; }
.notice-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.notice-item:last-child { border-bottom: none; }
.notice-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.bar-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.bar-row:last-child { border-bottom: none; }
.bar-bg { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.sibling-badge { font-size: 10px; background: var(--teal-bg); color: var(--teal); padding: 1px 6px; border-radius: 10px; font-weight: 500; }

/* ── LOGIN ── */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px 40px; width: 100%; max-width: 380px; }
.login-logo { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; letter-spacing: -0.5px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
.login-field { margin-bottom: 14px; }
.login-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.login-field input, .login-field select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; font-family: var(--font); font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: border 0.15s; }
.login-field input:focus, .login-field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,91,227,0.1); }
.login-btn { width: 100%; padding: 10px; background: var(--text); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; transition: background 0.15s; }
.login-btn:hover { background: #2a2a2a; }
.login-error { color: var(--danger); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }

/* ── ATTENDANCE GRID ── */
.att-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.att-cell { border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; cursor: pointer; transition: all 0.15s; }
.att-cell.present { background: var(--success-bg); border-color: #a3d9bc; }
.att-cell.absent { background: var(--danger-bg); border-color: #f0b0b0; }
.att-cell:hover { border-color: var(--accent); }
.att-name { font-size: 12px; font-weight: 500; }
.att-id { font-size: 10px; color: var(--text3); font-family: var(--mono); }

/* ── REPORTS ── */
.report-stat { background: var(--surface2); border-radius: var(--radius); padding: 14px; text-align: center; }
.report-stat-num { font-size: 28px; font-weight: 700; }
.report-stat-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── TABS ── */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab.active { color: var(--accent-text); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

/* ── PROGRESS BAR ── */
.progress { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.3s; }

@media (max-width: 900px) {
  .metrics-grid { grid-template-columns: repeat(2,1fr); }
  .two-col { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-grid-3 { grid-template-columns: 1fr 1fr; }
}
</style>

// ═══════════════════════════════════════════
function nextId(table) { db._seq[table] = (db._seq[table]||1)+1; return db._seq[table]; }

function nextAdmissionId(branchId) {
  const branch = db.branches.find(b => b.id === branchId);
  if (!branch) return '?';
  const prefix = branch.prefix;
  const existing = db.students.filter(s => s.branch_id === branchId)
    .map(s => {
      const m = s.admission_id.match(/^[A-Z](\d+)/);
      return m ? parseInt(m[1]) : 99;
    });
  const max = existing.length ? Math.max(...existing) : 99;
  return prefix + (max + 1);
}

function scopedStudents() {
  if (!state.currentBranch) return db.students;
  return db.students.filter(s => s.branch_id === state.currentBranch);
}
function scopedStaff() {
  if (!state.currentBranch) return db.staff;
  return db.staff.filter(s => s.branch_id === state.currentBranch);
}
function scopedSessions() {
  if (!state.currentBranch) return db.sessions;
  return db.sessions.filter(s => s.branch_id === state.currentBranch);
}
function branchName(id) { const b = db.branches.find(b=>b.id===id); return b?b.name:'—'; }
function staffName(id) { const s = db.staff.find(s=>s.id===id); return s?s.name:'—'; }
function getBranch(id) { return db.branches.find(b=>b.id===id); }

function canAccess(page) {
  const r = state.currentUser?.role;
  if (r === 'super_admin') return true;
  if (r === 'branch_manager') return ['dashboard','students','staff','attendance','sessions','invoices','session_reports','reports'].includes(page);
  if (r === 'teacher') return ['dashboard','attendance','sessions','session_reports'].includes(page);
  if (r === 'receptionist') return ['dashboard','students','sessions','invoices'].includes(page);
  return false;
}

function roleBadge(role) {
  const map = {
    super_admin: ['badge-purple','Super admin'],
    branch_manager: ['badge-blue','Branch manager'],
    teacher: ['badge-teal','Teacher'],
    receptionist: ['badge-amber','Receptionist'],
  };
  const [cls, label] = map[role] || ['badge-gray', role];
  return `<span class="badge ${cls}">${label}</span>`;
}

function statusDot(s) {
  return s === 'active'
    ? `<span class="dot dot-green"></span> Active`
    : `<span class="dot dot-red"></span> Inactive`;
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = (type === 'success' ? '✓ ' : '✕ ') + msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function log(action, table, record_id) {
  db.audit_log.unshift({
    id: (db.audit_log.length+1),
    user_id: state.currentUser?.id,
    user_name: state.currentUser?.name,
    branch_id: state.currentBranch,
    action, table_name: table, record_id: String(record_id),
    timestamp: new Date().toISOString()
  });
  if (db.audit_log.length > 200) db.audit_log.pop();
  saveDB();
}

function avatarInitials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function avatarClass(role) {
  return {super_admin:'av-purple',branch_manager:'av-blue',teacher:'av-teal',receptionist:'av-amber'}[role]||'av-blue';
}

  const students = scopedStudents();

    const bSessions = db.sessions.filter(s=>s.branch_id===b.id);
    const bStudents = db.students.filter(s=>s.branch_id===b.id);
    const totalSlots = bSessions.length * 5; // 5 students per slot max per teacher
    const used = db.attendance.filter(a => bSessions.find(s=>s.id===a.session_id)).length;
    const pct = totalSlots ? Math.round(used/totalSlots*100) : 0;
    return { ...b, pct, studentCount: bStudents.length, sessionCount: bSessions.length };

  const notices = [];
  const missingId = db.students.filter(s=>!s.admission_id);

  const allUsers = db.users;

  notices.push({color:'var(--accent)',msg:`System running normally — ${db.students.length} students enrolled`});

// ── INVOICES ──
function renderInvoices() {
  const filter = state.invoiceFilter || 'all';
  const scopedInvoices = state.currentBranch
    ? db.invoices.filter(i=>i.branch_id===state.currentBranch)
    : db.invoices;
  const filtered = filter === 'all' ? scopedInvoices : scopedInvoices.filter(i=>i.status===filter);
  const total = scopedInvoices.reduce((s,i)=>s+i.amount,0);
  const paid = scopedInvoices.filter(i=>i.status==='paid').reduce((s,i)=>s+i.amount,0);
  const outstanding = scopedInvoices.filter(i=>i.status!=='paid').reduce((s,i)=>s+i.amount,0);

  function invBadge(status) {
    if (status==='paid')    return `<span class="badge badge-success">Paid</span>`;
    if (status==='overdue') return `<span class="badge badge-danger">Overdue</span>`;
    return `<span class="badge badge-amber">Due</span>`;
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
    <div><div class="section-title">Invoices & fees</div><div class="section-sub">Monthly fee tracking and invoice management</div></div>
    <button class="btn btn-primary" data-action="gen-invoices">Generate monthly invoices</button>
  </div>
  <div class="metrics-grid" style="grid-template-columns:repeat(4,1fr);">
    <div class="metric-card"><div class="metric-label">Total invoiced</div><div class="metric-value">£${total.toLocaleString()}</div><div class="metric-sub">This month</div></div>
    <div class="metric-card"><div class="metric-label">Collected</div><div class="metric-value" style="color:var(--success);">£${paid.toLocaleString()}</div><div class="metric-sub">${scopedInvoices.length ? Math.round(paid/total*100) : 0}% of total</div></div>
    <div class="metric-card"><div class="metric-label">Outstanding</div><div class="metric-value" style="color:var(--danger);">£${outstanding.toLocaleString()}</div><div class="metric-sub">${scopedInvoices.filter(i=>i.status!=='paid').length} invoices</div></div>
    <div class="metric-card"><div class="metric-label">Overdue</div><div class="metric-value" style="color:var(--danger);">${scopedInvoices.filter(i=>i.status==='overdue').length}</div><div class="metric-sub">Need chasing</div></div>
  </div>
  <div class="toolbar">
    ${['all','paid','due','overdue'].map(f=>`<button class="btn btn-sm ${filter===f?'btn-primary':''}" data-action="inv-filter" data-filter="${f}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`).join('')}
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>ID</th><th>Branch</th><th>Month</th><th>Amount</th><th>Status</th><th>Issued</th><th>Paid date</th><th>Notes</th><th></th></tr></thead>
        <tbody>
          ${filtered.map(inv=>{
            const st = db.students.find(s=>s.id===inv.student_id);
            return `<tr>
              <td><strong>${st?.name||'?'}</strong></td>
              <td><span class="id-code">${st?.admission_id||'?'}</span></td>
              <td><span class="badge badge-gray">${branchName(inv.branch_id)}</span></td>
              <td>${inv.month}</td>
              <td><strong>£${inv.amount}</strong></td>
              <td>${invBadge(inv.status)}</td>
              <td style="font-size:12px;color:var(--text3);">${inv.issued}</td>
              <td style="font-size:12px;color:var(--text3);">${inv.paid_date||'—'}</td>
              <td style="font-size:12px;color:var(--text3);">${inv.notes||'—'}</td>
              <td><div class="row-actions">
                ${inv.status!=='paid'?`<button class="btn btn-sm" data-action="mark-paid" data-id="${inv.id}">Mark paid</button>`:''}
                <button class="btn btn-sm" data-action="edit-invoice" data-id="${inv.id}">Edit</button>
              </div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

//  EVENTS
// ═══════════════════════════════════════════
function attachEvents() {
  // Login
  document.getElementById('login-btn')?.addEventListener('click', doLogin);
  document.getElementById('parent-login-btn')?.addEventListener('click', doParentLogin);
  document.getElementById('l-pass')?.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

  // Nav
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      state.page = el.dataset.page;
      if (action) { state.modal = action; state.editTarget = null; }
      render();
    });
  });

  // Branch switch
  document.getElementById('branch-switch')?.addEventListener('change', e => {
    state.currentBranch = e.target.value ? parseInt(e.target.value) : null;
    render();
  });

  // Logout
  document.getElementById('logout-btn')?.addEventListener('click', () => {
    state.currentUser = null; state.currentBranch = null; state.page = 'dashboard';
    render();
  });

  // Actions
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      const action = el.dataset.action;
      const id = el.dataset.id ? parseInt(el.dataset.id) : null;
      handleAction(action, id, e);
    });
  });

  // Modal close
  document.getElementById('modal-close')?.addEventListener('click', closeModal);
  document.getElementById('modal-cancel')?.addEventListener('click', closeModal);
  document.getElementById('modal-backdrop')?.addEventListener('click', e => { if (e.target.id==='modal-backdrop') closeModal(); });
  document.getElementById('modal-save')?.addEventListener('click', doSave);

  // Search
  document.getElementById('student-search')?.addEventListener('input', e => {
    state.studentSearch = e.target.value; render();
  });

  // Attendance session select
  document.getElementById('att-session-select')?.addEventListener('change', e => {
    state.attSessionId = e.target.value ? parseInt(e.target.value) : null; render();
  });

  // Session report select
  document.getElementById('sr-session-select')?.addEventListener('change', e => {
    state.sessionReportId = e.target.value ? parseInt(e.target.value) : null; render();
  });
}

function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const bId   = document.getElementById('l-branch').value;
  const user  = db.users.find(u => u.email === email && u.password === pass && u.status === 'active');
  if (!user) { document.getElementById('login-err').textContent = 'Invalid email or password.'; return; }
  // role-based branch restriction
  if (user.role !== 'super_admin' && user.branch_id && bId && parseInt(bId) !== user.branch_id) {
    document.getElementById('login-err').textContent = 'You do not have access to that branch.'; return;
  }
  state.currentUser = user;
  state.currentBranch = user.role === 'super_admin' ? (bId ? parseInt(bId) : null) : user.branch_id;
  state.page = 'dashboard';
  log('login', 'users', user.id);
  render();
}

function doParentLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const pu = db.parent_users.find(p=>p.email===email&&p.password===pass&&p.status==='active');
  if (!pu) { document.getElementById('login-err').textContent='Invalid parent email or password.'; return; }
  state.parentUser = pu;
  state.currentUser = null;
  render();
}

function handleAction(action, id, e) {
  if (action === 'add-student')  { state.modal = 'add-student';  state.editTarget = null; render(); return; }
  if (action === 'edit-student') { state.modal = 'edit-student'; state.editTarget = db.students.find(s=>s.id===id); render(); return; }
  if (action === 'del-student')  { if (confirm('Delete this student?')) { db.students = db.students.filter(s=>s.id!==id); log('delete','students',id); saveDB(); toast('Student deleted'); render(); } return; }

  if (action === 'add-staff')   { state.modal = 'add-staff';   state.editTarget = null; render(); return; }
  if (action === 'edit-staff')  { state.modal = 'edit-staff';  state.editTarget = db.staff.find(s=>s.id===id); render(); return; }
  if (action === 'del-staff')   { if (confirm('Delete this staff member?')) { db.staff = db.staff.filter(s=>s.id!==id); log('delete','staff',id); saveDB(); toast('Staff deleted'); render(); } return; }

  if (action === 'add-session')  { state.modal = 'add-session';  state.editTarget = null; render(); return; }
  if (action === 'del-session')  { if (confirm('Delete this session?')) { db.sessions = db.sessions.filter(s=>s.id!==id); log('delete','sessions',id); saveDB(); toast('Session deleted'); render(); } return; }
  if (action === 'mark-att')    { state.page = 'attendance'; state.attSessionId = id; render(); return; }

  if (action === 'add-user')    { state.modal = 'add-user';    state.editTarget = null; render(); return; }
  if (action === 'edit-user')   { state.modal = 'edit-user';   state.editTarget = db.users.find(u=>u.id===id); render(); return; }
  if (action === 'del-user')    { if (confirm('Delete this user?')) { db.users = db.users.filter(u=>u.id!==id); log('delete','users',id); saveDB(); toast('User deleted'); render(); } return; }

  if (action === 'add-branch')  { state.modal = 'add-branch';  state.editTarget = null; render(); return; }
  if (action === 'edit-branch') { state.modal = 'edit-branch'; state.editTarget = db.branches.find(b=>b.id===id); render(); return; }
  if (action === 'del-branch')  { if (confirm('Delete this branch? This will not remove associated students.')) { db.branches = db.branches.filter(b=>b.id!==id); log('delete','branches',id); saveDB(); toast('Branch deleted'); render(); } return; }

  if (action === 'toggle-att') {
    const sid = parseInt(el_data(e,'session'));
    const stId = parseInt(el_data(e,'student'));
    let rec = db.attendance.find(a=>a.session_id===sid&&a.student_id===stId);
    if (rec) { rec.status = rec.status==='present'?'absent':'present'; }
    else { db.attendance.push({id:nextId('attendance'),session_id:sid,student_id:stId,status:'present',notes:''}); }
    saveDB(); render(); return;
  }

  if (action === 'save-att') { saveDB(); toast('Attendance saved'); return; }

  if (action === 'inv-filter') { state.invoiceFilter = e.target.dataset.filter; render(); return; }
  if (action === 'mark-paid') {
    const inv = db.invoices.find(i=>i.id===id);
    if (inv) { inv.status='paid'; inv.paid_date=new Date().toISOString().slice(0,10); log('edit','invoices',id); saveDB(); toast('Invoice marked as paid'); render(); }
    return;
  }
  if (action === 'edit-invoice') { state.modal='edit-invoice'; state.editTarget=db.invoices.find(i=>i.id===id); render(); return; }
  if (action === 'gen-invoices') {
    const month = new Date().toISOString().slice(0,7);
    let added = 0;
    scopedStudents().forEach(st=>{
      if (!db.invoices.find(i=>i.student_id===st.id&&i.month===month)) {
        db.invoices.push({id:nextId('invoices'),student_id:st.id,branch_id:st.branch_id,month,amount:120,status:'due',issued:new Date().toISOString().slice(0,10),paid_date:'',notes:''});
        added++;
      }
    });
    log('add','invoices','batch'); saveDB(); toast(`${added} invoice(s) generated`); render(); return;
  }

  if (action === 'add-progress') {
    state.modal='add-progress';
    state.editTarget={session_id:parseInt(e.target.dataset.session)};
    render(); return;
  }
  if (action === 'export-session-report') {
    const sess = db.sessions.find(s=>s.id===id);
    const attRecs = db.attendance.filter(a=>a.session_id===id);
    const headers = ['Student','Admission ID','Status','Notes'];
    const rows = attRecs.map(a=>{
      const st=db.students.find(s=>s.id===a.student_id);
      return [st?.name||'?',st?.admission_id||'?',a.status,a.notes];
    });
    const csv=[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`session_${id}_report.csv`;a.click();
    toast('Session report exported'); return;
  }

  if (action === 'add-parent-user')  { state.modal='add-parent-user';  state.editTarget=null; render(); return; }
  if (action === 'edit-parent-user') { state.modal='edit-parent-user'; state.editTarget=db.parent_users.find(p=>p.id===id); render(); return; }
  if (action === 'del-parent-user')  { if(confirm('Delete parent account?')){ db.parent_users=db.parent_users.filter(p=>p.id!==id); log('delete','parent_users',id); saveDB(); toast('Parent account deleted'); render(); } return; }
  if (action === 'preview-parent')   { const pu=db.parent_users.find(p=>p.id===id); if(pu){ state.parentUser=pu; state.currentUser=null; render(); } return; }

  if (action === 'sr-session-select') { state.sessionReportId=parseInt(e.target.value)||null; render(); return; }

  if (action === 'export-students') { exportCSV('students'); return; }
  if (action === 'export-attendance') { exportCSV('attendance'); return; }
  if (action === 'export-sessions') { exportCSV('sessions'); return; }
}

function el_data(e, key) { return e.target.closest('[data-'+key+']')?.dataset[key]; }

function doSave() {
  const m = state.modal;
  const val = id => document.getElementById(id)?.value;

  if (m === 'add-student' || m === 'edit-student') {
    const name = val('f-name'); if (!name) { toast('Name required','error'); return; }
    if (m === 'add-student') {
      const rec = { id: nextId('students'), branch_id: parseInt(val('f-branch')), admission_id: val('f-admid'), name, year: val('f-year'), parent: val('f-parent'), status: val('f-status'), notes: val('f-notes') };
      db.students.push(rec); log('add','students',rec.id); toast('Student enrolled');
    } else {
      const s = state.editTarget;
      Object.assign(s, { branch_id: parseInt(val('f-branch')), admission_id: val('f-admid'), name, year: val('f-year'), parent: val('f-parent'), status: val('f-status'), notes: val('f-notes') });
      log('edit','students',s.id); toast('Student updated');
    }
  }

  if (m === 'add-staff' || m === 'edit-staff') {
    const name = val('f-name'); if (!name) { toast('Name required','error'); return; }
    if (m === 'add-staff') {
      const rec = { id: nextId('staff'), branch_id: parseInt(val('f-branch')), name, role: val('f-role'), subject: val('f-subject'), contact: val('f-contact'), status: val('f-status') };
      db.staff.push(rec); log('add','staff',rec.id); toast('Staff added');
    } else {
      const s = state.editTarget;
      Object.assign(s, { branch_id: parseInt(val('f-branch')), name, role: val('f-role'), subject: val('f-subject'), contact: val('f-contact'), status: val('f-status') });
      log('edit','staff',s.id); toast('Staff updated');
    }
  }

  if (m === 'add-session' || m === 'edit-session') {
    if (m === 'add-session') {
      const rec = { id: nextId('sessions'), branch_id: parseInt(val('f-branch')), date: val('f-date'), slot: val('f-slot'), staff_id: parseInt(val('f-staff')), subject: val('f-subject'), table_no: parseInt(val('f-table'))||1 };
      db.sessions.push(rec); log('add','sessions',rec.id); toast('Session added');
    } else {
      const s = state.editTarget;
      Object.assign(s, { branch_id: parseInt(val('f-branch')), date: val('f-date'), slot: val('f-slot'), staff_id: parseInt(val('f-staff')), subject: val('f-subject'), table_no: parseInt(val('f-table'))||1 });
      log('edit','sessions',s.id); toast('Session updated');
    }
  }

  if (m === 'add-user' || m === 'edit-user') {
    const name = val('f-name'), email = val('f-email');
    if (!name || !email) { toast('Name and email required','error'); return; }
    if (m === 'add-user') {
      const pass = val('f-password'); if (!pass) { toast('Password required','error'); return; }
      const rec = { id: nextId('users'), name, email, password: pass, role: val('f-role'), branch_id: val('f-branch') ? parseInt(val('f-branch')) : null, status: val('f-status') };
      db.users.push(rec); log('add','users',rec.id); toast('User added');
    } else {
      const u = state.editTarget;
      const pass = val('f-password');
      Object.assign(u, { name, email, role: val('f-role'), branch_id: val('f-branch') ? parseInt(val('f-branch')) : null, status: val('f-status') });
      if (pass) u.password = pass;
      log('edit','users',u.id); toast('User updated');
    }
  }

  if (m === 'add-branch' || m === 'edit-branch') {
    const name = val('f-name'), prefix = val('f-prefix')?.toUpperCase();
    if (!name || !prefix) { toast('Name and prefix required','error'); return; }
    if (m === 'add-branch') {
      const rec = { id: nextId('branches'), name, prefix, address: val('f-address'), phone: val('f-phone'), email: val('f-email'), status: val('f-status') };
      db.branches.push(rec); log('add','branches',rec.id); toast('Branch added');
    } else {
      const b = state.editTarget;
      Object.assign(b, { name, prefix, address: val('f-address'), phone: val('f-phone'), email: val('f-email'), status: val('f-status') });
      log('edit','branches',b.id); toast('Branch updated');
    }
  }

  if (m === 'edit-invoice') {
    const inv = state.editTarget;
    Object.assign(inv, { amount: parseInt(document.getElementById('f-amount')?.value)||120, status: document.getElementById('f-inv-status')?.value, paid_date: document.getElementById('f-paid-date')?.value, notes: document.getElementById('f-notes')?.value });
    log('edit','invoices',inv.id); toast('Invoice updated');
  }

  if (m === 'add-progress') {
    const sessId = state.editTarget?.session_id;
    const sess = db.sessions.find(s=>s.id===sessId);
    const rec = {
      id: nextId('progress'),
      student_id: parseInt(document.getElementById('f-student')?.value),
      session_id: sessId,
      staff_id: sess?.staff_id||1,
      subject: document.getElementById('f-subject')?.value,
      rating: parseInt(document.getElementById('f-rating')?.value)||4,
      comment: document.getElementById('f-comment')?.value,
      date: sess?.date || new Date().toISOString().slice(0,10)
    };
    db.progress.push(rec); log('add','progress',rec.id); toast('Progress note added');
  }

  if (m === 'add-parent-user' || m === 'edit-parent-user') {
    const name = document.getElementById('f-name')?.value;
    const email = document.getElementById('f-email')?.value;
    if (!name || !email) { toast('Name and email required','error'); return; }
    const sel = document.getElementById('f-students');
    const studentIds = sel ? Array.from(sel.selectedOptions).map(o=>parseInt(o.value)) : [];
    if (m === 'add-parent-user') {
      const pass = document.getElementById('f-password')?.value;
      if (!pass) { toast('Password required','error'); return; }
      const rec = { id: nextId('parent_users'), name, email, password: pass, student_ids: studentIds, status: document.getElementById('f-status')?.value };
      db.parent_users.push(rec); log('add','parent_users',rec.id); toast('Parent account added');
    } else {
      const pu = state.editTarget;
      const pass = document.getElementById('f-password')?.value;
      Object.assign(pu, { name, email, student_ids: studentIds, status: document.getElementById('f-status')?.value });
      if (pass) pu.password = pass;
      log('edit','parent_users',pu.id); toast('Parent account updated');
    }
  }

  saveDB(); closeModal(); render();
}

function closeModal() { state.modal = null; state.editTarget = null; render(); }

// ═══════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════
function exportCSV(type) {
  let rows, headers;
  if (type === 'students') {
    headers = ['Admission ID','Name','Year','Branch','Parent','Status','Notes'];
    rows = scopedStudents().map(s=>[s.admission_id,s.name,s.year,branchName(s.branch_id),s.parent,s.status,s.notes]);
  } else if (type === 'sessions') {
    headers = ['Date','Slot','Branch','Teacher','Subject','Table'];
    rows = scopedSessions().map(s=>[s.date,s.slot,branchName(s.branch_id),staffName(s.staff_id),s.subject,s.table_no]);
  } else {
    headers = ['Session ID','Student','Admission ID','Status','Notes'];
    rows = db.attendance.map(a=>{
      const st = db.students.find(s=>s.id===a.student_id);
      return [a.session_id, st?.name||'?', st?.admission_id||'?', a.status, a.notes];
    });
  }
  const csv = [headers, ...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`${type}_export.csv`; a.click();
  toast(`${type} exported`);
}

function modalInvoice() {
  const inv = state.editTarget || {};
  const st = db.students.find(s=>s.id===inv.student_id);
  return modalWrap('Edit invoice', `
    <div style="margin-bottom:14px;font-size:13px;color:var(--text2);">Student: <strong>${st?.name||'?'}</strong> (${st?.admission_id||'?'}) — ${inv.month}</div>
    <div class="form-grid">
      <div class="field"><label>Amount (£)</label><input type="number" id="f-amount" value="${inv.amount||120}"></div>
      <div class="field"><label>Status</label><select id="f-inv-status">
        <option value="due" ${inv.status==='due'?'selected':''}>Due</option>
        <option value="paid" ${inv.status==='paid'?'selected':''}>Paid</option>
        <option value="overdue" ${inv.status==='overdue'?'selected':''}>Overdue</option>
      </select></div>
      <div class="field"><label>Paid date</label><input type="date" id="f-paid-date" value="${inv.paid_date||''}"></div>
      <div class="field"><label>Notes</label><input type="text" id="f-notes" value="${inv.notes||''}"></div>
    </div>`,
  `<button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">Save changes</button>`);
}

function modalProgress() {
  const data = state.editTarget || {};
  const sessionId = data.session_id;
  const sess = db.sessions.find(s=>s.id===sessionId);
  const branchStudents = sess ? db.students.filter(s=>s.branch_id===sess.branch_id&&s.status==='active') : [];
  return modalWrap('Add progress note', `
    <div class="form-grid">
      <div class="field"><label>Student</label><select id="f-student">${branchStudents.map(s=>`<option value="${s.id}">${s.name} (${s.admission_id})</option>`).join('')}</select></div>
      <div class="field"><label>Subject</label><select id="f-subject">
        ${['Maths','English','Science','History','Geography','Other'].map(s=>`<option>${s}</option>`).join('')}
      </select></div>
      <div class="field"><label>Rating (1–5)</label><select id="f-rating">
        ${[1,2,3,4,5].map(n=>`<option value="${n}" ${n===4?'selected':''}>${n} star${n>1?'s':''}</option>`).join('')}
      </select></div>
      <div class="field" style="grid-column:1/-1;"><label>Comment</label><textarea id="f-comment" rows="3" placeholder="Teacher notes on student progress…"></textarea></div>
    </div>`,
  `<button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">Save note</button>`);
}

function modalParentUser() {
  const pu = state.editTarget || {};
  const allStudents = db.students;
  return modalWrap(pu.id?'Edit parent account':'Add parent account', `
    <div class="form-grid">
      <div class="field"><label>Parent / guardian name</label><input type="text" id="f-name" value="${pu.name||''}"></div>
      <div class="field"><label>Email</label><input type="email" id="f-email" value="${pu.email||''}"></div>
      <div class="field"><label>Password</label><input type="password" id="f-password" placeholder="${pu.id?'Leave blank to keep':'Set password'}"></div>
      <div class="field"><label>Status</label><select id="f-status">
        <option value="active" ${!pu.status||pu.status==='active'?'selected':''}>Active</option>
        <option value="inactive" ${pu.status==='inactive'?'selected':''}>Inactive</option>
      </select></div>
      <div class="field" style="grid-column:1/-1;"><label>Linked students (hold Ctrl/Cmd to select multiple)</label>
        <select id="f-students" multiple style="height:120px;">
          ${allStudents.map(s=>`<option value="${s.id}" ${pu.student_ids?.includes(s.id)?'selected':''}>${s.name} (${s.admission_id}) — ${branchName(s.branch_id)}</option>`).join('')}
        </select>
      </div>
    </div>`,
  `<button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">${pu.id?'Save changes':'Add account'}</button>`);
}
