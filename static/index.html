      const p=stuList.filter(function(st){const r=localA[st.id];return r&&r.status==='present';}).length;
      const a=stuList.filter(function(st){const r=localA[st.id];return r&&r.status==='absent';}).length;
      const u=stuList.length-p-a;
      html2+='<div class="card" style="margin-bottom:12px;">';
      html2+='<div class="card-header">';
      html2+='<div><div style="font-weight:600;">'+sess.slot+' · Table '+sess.table_no+' · '+(sess.staff_name||'No teacher')+'</div><div style="font-size:12px;color:var(--text3);">'+sess.branch_name+'</div></div>';
      html2+='<div style="display:flex;gap:8px;align-items:center;">';
      html2+='<span class="badge badge-success">'+p+' present</span><span class="badge badge-danger">'+a+' absent</span><span class="badge badge-gray">'+u+' unmarked</span>';
      html2+='<button class="btn btn-sm btn-primary" data-action="save-att" data-id="'+sess.id+'">Save</button>';
      html2+='</div></div>';
      html2+='<div class="att-grid">';
      stuList.forEach(function(st){
        var rec=localA[st.id];
        html2+='<div class="att-cell '+(rec?rec.status:'')+'" data-action="toggle-att" data-student="'+st.id+'" data-session="'+sess.id+'">';
        html2+='<button class="att-remove" data-action="att-remove-student" data-student="'+st.id+'" data-session="'+sess.id+'" title="Remove from this session">✕</button>';
        html2+='<div class="att-name">'+st.name+'</div>';
        html2+='<div class="att-id">'+st.admission_id+' · T'+st.table_no+'</div>';
        html2+='<div class="att-status" style="color:'+(rec?(rec.status==='present'?'var(--success-text)':'var(--danger-text)'):'var(--text3)')+'">'+( rec?rec.status.toUpperCase():'—')+'</div>';
        html2+='</div>';
      });
      if(!stuList.length)html2+='<div style="color:var(--text3);font-size:13px;padding:10px;">No students found — set up table allocations in Session Planner</div>';
      html2+='</div></div>';
    });
    html+=html2;
  }

  // ── Single session card ──
  if(selSess){
    var allocs=state.data['table_allocs_'+selId]||[];
    html+='<div class="card">';
    html+='<div class="card-header">';
    html+='<div>';
    html+='<div class="card-title">'+new Date(selSess.date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</div>';
    html+='<div style="font-size:12px;color:var(--text3);margin-top:2px;">'+selSess.slot+' · Table '+selSess.table_no+' · '+(selSess.staff_name||'No teacher')+' · '+selSess.branch_name+'</div>';
    html+='</div>';
    html+='<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">';
    html+='<span class="badge badge-success">'+presentCount+' present</span>';
    html+='<span class="badge badge-danger">'+absentCount+' absent</span>';
    html+='<span class="badge badge-gray">'+unmarkedCount+' unmarked</span>';
    html+='<button class="btn btn-sm btn-primary" data-action="save-att" data-id="'+selId+'">Save attendance</button>';
    html+='</div></div>';

    // Status filter buttons
    html+='<div style="display:flex;gap:8px;align-items:center;margin:12px 0;flex-wrap:wrap;">';
    html+='<span style="font-size:12px;color:var(--text3);font-weight:600;">Show:</span>';
    [['all','All ('+sessionStudents.length+')'],['present','Present ('+presentCount+')'],['absent','Absent ('+absentCount+')'],['unmarked','Unmarked ('+unmarkedCount+')']].forEach(function(f){
      html+='<button class="btn btn-sm '+(attStatusFilter===f[0]?'btn-primary':'')+'" data-action="att-status-filter" data-filter="'+f[0]+'" style="'+(attStatusFilter===f[0]?'':'background:var(--surface2);')+'">'+f[1]+'</button>';
    });
    html+='</div>';

    if(!state.data['sess_students_'+selId]){
      html+='<div style="padding:12px 16px;background:var(--accent-bg);border-radius:var(--radius);font-size:13px;color:var(--accent);margin-bottom:12px;">Loading students…</div>';
    } else if(sessionStudents.length===0){
      html+='<div style="padding:12px 16px;background:var(--warning-bg);border-radius:var(--radius);font-size:13px;color:var(--amber-text);margin-bottom:12px;">⚠ No students found. Set up table allocations in Session Planner, or assign students via session_students.</div>';
    }

    html+='<p style="font-size:12px;color:var(--text3);margin-bottom:14px;">Click a card to toggle · Showing '+visibleStudents.length+(attStatusFilter!=='all'?' of '+sessionStudents.length:'')+' students</p>';
    html+='<div class="att-grid">';
    visibleStudents.forEach(function(st){
      var rec=localAtt[st.id];
      html+='<div class="att-cell '+(rec?rec.status:'')+'" data-action="toggle-att" data-student="'+st.id+'" data-session="'+selId+'">';
      html+='<button class="att-remove" data-action="att-remove-student" data-student="'+st.id+'" data-session="'+selId+'" title="Remove from this session">✕</button>';
      html+='<div class="att-name">'+st.name+'</div>';
      html+='<div class="att-id">'+st.admission_id+(st.table_no?' · T'+st.table_no:'')+'</div>';
      html+='<div class="att-status" style="color:'+(rec?(rec.status==='present'?'var(--success-text)':'var(--danger-text)'):'var(--text3)')+'">'+( rec?rec.status.toUpperCase():'—')+'</div>';
      html+='</div>';
    });
    if(visibleStudents.length===0){html+='<div style="grid-column:1/-1;padding:30px;text-align:center;color:var(--text3);font-size:13px;">No students match this filter</div>';}
    html+='</div></div>';
  }
  return html;
}

function renderInvoices(){
  const invs=state.data.invoices||[];
  const tab=state.invTab||'list';
  const f=state.invoiceFilter||'all';
  const feeFilter=state.invFeeFilter||'all';
  const monthFilter=state.invMonthFilter||'';

  const total=invs.reduce((s,i)=>s+parseFloat(i.amount||0),0);
  const paid=invs.filter(i=>i.status==='paid').reduce((s,i)=>s+parseFloat(i.amount||0),0);
  const out=invs.filter(i=>i.status!=='paid').reduce((s,i)=>s+parseFloat(i.amount||0),0);

  const feeLabels={monthly_fee:'Monthly fee',opening_balance:'Opening balance',admission_fee:'Admission fee',book_fee:'Book fee',past_papers_fee:'Past papers fee',miscellaneous:'Miscellaneous'};
  const feeColors={monthly_fee:'var(--accent)',opening_balance:'var(--danger)',admission_fee:'var(--teal)',book_fee:'var(--purple)',past_papers_fee:'var(--amber-text)',miscellaneous:'var(--text3)'};

  // Get unique months for filter
  const months=[...new Set(invs.map(i=>i.month).filter(Boolean))].sort().reverse();

  const searchTerm=(state.invSearch||'').trim().toLowerCase();

  // Apply all filters
  let filtered=invs;
  if(f!=='all') filtered=filtered.filter(i=>i.status===f);
  if(feeFilter!=='all') filtered=filtered.filter(i=>(i.fee_type||'monthly_fee')===feeFilter);
  if(monthFilter) filtered=filtered.filter(i=>i.month===monthFilter);
  if(searchTerm) filtered=filtered.filter(i=>
    (i.student_name||'').toLowerCase().includes(searchTerm) ||
    (i.admission_id||'').toLowerCase().includes(searchTerm)
  );

  // Sort by admission ID (natural sort: H103, H103a, H104, H104a...)
  filtered=[...filtered].sort((a,b)=>{
    const re=/^([A-Za-z]*)(\d+)([A-Za-z]*)$/;
    const ma=(a.admission_id||'').match(re), mb=(b.admission_id||'').match(re);
    if(ma&&mb){
      if(ma[1]!==mb[1]) return ma[1]<mb[1]?-1:1;
      const na=parseInt(ma[2]), nb=parseInt(mb[2]);
      if(na!==nb) return na-nb;
      return ma[3]<mb[3]?-1:ma[3]>mb[3]?1:0;
    }
    return (a.admission_id||'').localeCompare(b.admission_id||'');
  });

  function invBadge(s){
    return s==='paid'?'<span class="badge badge-success">Paid</span>':
           s==='partial'?'<span class="badge badge-blue">Partial</span>':
           s==='overdue'?'<span class="badge badge-danger">Overdue</span>':
           '<span class="badge badge-amber">Due</span>';}

  function feeBadge(ft){
    const label=feeLabels[ft||'monthly_fee']||ft||'Monthly fee';
    const color=feeColors[ft||'monthly_fee']||'var(--text3)';
    return '<span class="badge" style="color:'+color+';border-color:'+color+';">'+label+'</span>';}

  function buildTable(list){
    if(!list.length) return '<tr><td colspan="11"><div class="empty-state" style="padding:30px;">No invoices found</div></td></tr>';
    return list.map(function(inv){
      return '<tr>'+
        '<td><strong>'+inv.student_name+'</strong></td>'+
        '<td><span class="id-code">'+inv.admission_id+'</span></td>'+
        '<td><span class="badge badge-accent">'+(inv.branch_name||'?')+'</span></td>'+
        '<td style="color:var(--text2);">'+inv.month+'</td>'+
        '<td>'+feeBadge(inv.fee_type)+'</td>'+
        '<td><strong style="color:var(--text);">£'+parseFloat(inv.amount||0).toFixed(2)+'</strong>'+
          (inv.status==='partial'?'<div style="font-size:11px;color:var(--text3);">Paid £'+parseFloat(inv.amount_paid||0).toFixed(2)+' · Bal £'+parseFloat(inv.balance||0).toFixed(2)+'</div>':'')+
        '</td>'+
        '<td>'+invBadge(inv.status)+'</td>'+
        '<td style="font-size:12px;color:var(--text3);">'+(inv.issued||'—')+'</td>'+
        '<td style="font-size:12px;color:var(--text3);">'+(inv.paid_date||'—')+'</td>'+
        '<td style="font-size:12px;color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;">'+(inv.notes||inv.description||'—')+'</td>'+
        '<td><div class="row-actions">'+
          (inv.status!=='paid'?'<button class="btn btn-sm btn-success" data-action="mark-paid" data-id="'+inv.id+'">'+(inv.status==='partial'?'Add payment':'Mark paid')+'</button>':'')+
          '<button class="btn btn-sm" data-action="edit-invoice" data-id="'+inv.id+'">Edit</button>'+
          '<button class="btn btn-sm btn-danger" data-action="del-invoice" data-id="'+inv.id+'">Del</button>'+
        '</div></td>'+
      '</tr>';
    }).join('');
  }

  function exportInvoicesExcel(list, filename){
    const rows=[['Student','Admission ID','Branch','Month','Fee Type','Amount (£)','Status','Issued','Paid Date','Notes/Description']];
    list.forEach(function(inv){
      rows.push([inv.student_name,inv.admission_id,inv.branch_name||'',inv.month,feeLabels[inv.fee_type||'monthly_fee']||'Monthly fee',parseFloat(inv.amount||0).toFixed(2),inv.status,inv.issued||'',inv.paid_date||'',inv.notes||inv.description||'']);
    });
    exportXLSX(rows, filename, 'Invoices');
  }
  window._exportInvExcel=exportInvoicesExcel;

  let html='';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">';
  html+='<div><div class="section-title">Invoices & fees</div><div class="section-sub">Fee tracking, editing and management</div></div>';
  html+='<div style="display:flex;gap:8px;">';
  html+='<button class="btn btn-primary" data-action="gen-invoices">Generate monthly invoices</button>';
  html+='<button class="btn btn-primary" data-action="add-fee-invoice">+ Add fee</button>';
  html+='</div></div>';

  // Metric cards
  html+='<div class="metrics-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">';
  html+='<div class="metric-card" style="border-top:3px solid var(--accent);"><div class="metric-label">Total invoiced</div><div class="metric-value">£'+total.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div></div>';
  html+='<div class="metric-card" style="border-top:3px solid var(--success);"><div class="metric-label">Collected</div><div class="metric-value" style="color:var(--success-text);">£'+paid.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div><div class="metric-sub">'+(total?Math.round(paid/total*100):0)+'% of total</div></div>';
  html+='<div class="metric-card" style="border-top:3px solid var(--danger);"><div class="metric-label">Outstanding</div><div class="metric-value" style="color:var(--danger-text);">£'+out.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})+'</div><div class="metric-sub">'+invs.filter(i=>i.status!=='paid').length+' invoices</div></div>';
  html+='<div class="metric-card" style="border-top:3px solid var(--danger);"><div class="metric-label">Overdue</div><div class="metric-value" style="color:var(--danger-text);">'+invs.filter(i=>i.status==='overdue').length+'</div><div class="metric-sub">Need chasing</div></div>';
  html+='</div>';

  // Tabs
  html+='<div class="tab-bar" style="margin-bottom:16px;">';
  html+='<div class="tab '+(tab==='list'?'active':'')+'" data-action="inv-tab" data-tab="list">All invoices ('+invs.length+')</div>';
  html+='<div class="tab '+(tab==='generated'?'active':'')+'" data-action="inv-tab" data-tab="generated">Monthly fees ('+invs.filter(i=>(i.fee_type||'monthly_fee')==='monthly_fee').length+')</div>';
  html+='<div class="tab '+(tab==='other'?'active':'')+'" data-action="inv-tab" data-tab="other">Other fees ('+invs.filter(i=>i.fee_type&&i.fee_type!=='monthly_fee').length+')</div>';
  html+='</div>';

  // Search bar
  html+='<div style="margin-bottom:10px;">';
  html+='<input type="text" id="inv-search" value="'+(state.invSearch||'')+'" placeholder="Search by student name or admission ID (e.g. H103a)..." style="width:100%;max-width:400px;border:1px solid var(--border2);border-radius:var(--radius);padding:7px 12px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">';
  html+='</div>';

  // Filter bar
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;">';
  // Status filter
  ['all','due','partial','paid','overdue'].forEach(function(fl){
    html+='<button class="btn btn-sm '+(f===fl?'btn-primary':'')+'" data-action="inv-filter" data-filter="'+fl+'">'+fl.charAt(0).toUpperCase()+fl.slice(1)+'</button>';
  });
  html+='<div style="margin-left:8px;display:flex;gap:6px;align-items:center;">';
  // Month filter
  html+='<select id="inv-month-filter" style="border:1px solid var(--border2);border-radius:var(--radius);padding:5px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">';
  html+='<option value="">All months</option>';
  months.forEach(function(m){html+='<option value="'+m+'" '+(m===monthFilter?'selected':'')+'>'+m+'</option>';});
  html+='</select>';
  // Export button
  html+='<button class="btn btn-sm" data-action="export-inv-excel">⬇ Export Excel</button>';
  html+='</div></div>';

  // Determine which invoices to show based on tab
  let tabInvs=filtered;
  if(tab==='generated') tabInvs=filtered.filter(i=>(i.fee_type||'monthly_fee')==='monthly_fee');
  if(tab==='other') tabInvs=filtered.filter(i=>i.fee_type&&i.fee_type!=='monthly_fee');

  // Store for export
  window._currentFilteredInvoices=tabInvs;

  html+='<div style="margin-bottom:6px;font-size:12px;color:var(--text3);">'+tabInvs.length+' invoice'+(tabInvs.length!==1?'s':'')+' · Total: £'+tabInvs.reduce(function(s,i){return s+parseFloat(i.amount||0);},0).toFixed(2)+'</div>';
  html+='<div class="card" style="padding:0;overflow:hidden;"><div class="table-wrap"><table>';
  html+='<thead><tr><th>Student</th><th>ID</th><th>Branch</th><th>Month</th><th>Fee type</th><th>Amount</th><th>Status</th><th>Issued</th><th>Paid date</th><th>Notes</th><th></th></tr></thead>';
  html+='<tbody>'+buildTable(tabInvs)+'</tbody></table></div></div>';
  return html;
}


function renderSessionReports(){
  const sessions=state.data.sessions||[];
  const srTab=state.srTab||'daily';
  const selId=state.sessionReportId;
  const sel=sessions.find(function(s){return s.id===selId;});
  const dates=[...new Set(sessions.map(function(s){return s.date;}).filter(Boolean))].sort().reverse();
  const selDate=state.srDate||dates[0]||'';
  const report=state.data['session_report_'+selDate]||{slots:[]};

  function attBadge(status){
    if(status==='present') return '<span style="display:inline-block;width:16px;height:16px;background:var(--success);border-radius:50%;vertical-align:middle;"></span>';
    if(status==='absent')  return '<span style="display:inline-block;width:16px;height:16px;background:var(--danger);border-radius:50%;vertical-align:middle;"></span>';
    return '<span style="display:inline-block;width:16px;height:16px;background:var(--border2);border-radius:50%;vertical-align:middle;"></span>';
  }

  function exportDailyReport(){
    const rows=[['FT Harlesden — Session Report | '+selDate],[]];
    (report.slots||[]).forEach(function(slot){
      rows.push(['SLOT: '+slot.slot]);
      rows.push(['Table','Teacher','Subject','#','Student ID','Student Name','Attendance','Notes']);
      (slot.tables||[]).forEach(function(t){
        (t.students||[]).forEach(function(s,i){
          rows.push([
            i===0?'Table '+t.table_no:'',
            i===0?(t.teacher_name||'—'):'',
            i===0?(t.subject||'—'):'',
            i+1,
            s.admission_id||'—',
            s.student_name||'—',
            s.att_status||'—',
            s.att_notes||''
          ]);
        });
        rows.push(['','','','Total:',t.students?t.students.length:0]);
        rows.push([]);
      });
      rows.push(['SLOT TOTAL: '+slot.slot,'','','',slot.total_students||0]);
      rows.push([]);
    });
    exportXLSX(rows, 'fth-session-report-'+selDate+'.xlsx', 'Session Report');
  }  window._exportDailyReport=exportDailyReport;

  var html='';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">';
  html+='<div><div class="section-title" style="margin-bottom:2px;">Session reports</div>';
  html+='<div class="section-sub">Attendance register by slot, table and teacher</div></div>';
  html+='</div>';

  html+='<div class="tab-bar" style="margin-bottom:16px;">';
  html+='<div class="tab '+(srTab==='daily'?'active':'')+'" data-action="sr-tab" data-tab="daily">Daily report (all slots)</div>';
  html+='<div class="tab '+(srTab==='single'?'active':'')+'" data-action="sr-tab" data-tab="single">Single session</div>';
  html+='</div>';

  // ── DAILY REPORT ──
  if(srTab==='daily'){
    // Date selector + export
    html+='<div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:16px;">';
    html+='<div class="field" style="margin:0;"><label>Select date</label>';
    html+='<select id="sr-date-select" style="border:1px solid var(--border2);border-radius:var(--radius);padding:7px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">';
    html+='<option value="">— choose date —</option>';
    dates.forEach(function(d){
      html+='<option value="'+d+'" '+(d===selDate?'selected':'')+'>'+new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</option>';
    });
    html+='</select></div>';
    html+='<button class="btn btn-sm" onclick="window._exportDailyReport()">⬇ Export Excel</button>';
    html+='</div>';

    if(!selDate){
      html+='<div class="empty-state" style="padding:40px;">Select a date to view the session report</div>';
    } else if(!report.slots||!report.slots.length){
      html+='<div class="empty-state" style="padding:40px;">No sessions found for '+selDate+'. Make sure table allocations have been set up in the Session planner.</div>';
    } else {
      // Grand total bar
      var grandTotal=report.slots.reduce(function(t,s){return t+(s.total_students||0);},0);
      var grandPresent=report.slots.reduce(function(t,s){return t+(s.present||0);},0);
      var grandAbsent=report.slots.reduce(function(t,s){return t+(s.absent||0);},0);
      html+='<div style="display:flex;gap:10px;margin-bottom:16px;">';
      html+='<div class="metric-card" style="flex:1;border-top:3px solid var(--accent);"><div class="metric-label">Slots</div><div class="metric-value">'+report.slots.length+'</div></div>';
      html+='<div class="metric-card" style="flex:1;border-top:3px solid var(--success);"><div class="metric-label">Present</div><div class="metric-value" style="color:var(--success-text);">'+grandPresent+'</div></div>';
      html+='<div class="metric-card" style="flex:1;border-top:3px solid var(--danger);"><div class="metric-label">Absent</div><div class="metric-value" style="color:var(--danger-text);">'+grandAbsent+'</div></div>';
      html+='<div class="metric-card" style="flex:1;border-top:3px solid var(--purple);"><div class="metric-label">Total marked</div><div class="metric-value">'+grandTotal+'</div></div>';
      html+='</div>';

      // Each slot
      report.slots.forEach(function(slot){
        html+='<div class="card" style="margin-bottom:20px;">';
        // Slot header
        html+='<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;margin-bottom:14px;border-bottom:2px solid var(--border);">';
        html+='<div>';
        html+='<div style="font-weight:800;font-size:16px;color:var(--accent-text);">⏰ '+slot.slot+'</div>';
        html+='<div style="font-size:12px;color:var(--text3);margin-top:2px;">'+slot.tables_used+' tables · '+slot.total_students+' students</div>';
        html+='</div>';
        html+='<div style="display:flex;gap:6px;">';
        html+='<span class="badge badge-success">'+slot.present+' present</span>';
        html+='<span class="badge badge-danger">'+slot.absent+' absent</span>';
        html+='</div></div>';

        if(!slot.tables||!slot.tables.length){
          html+='<div style="color:var(--text3);font-size:13px;padding:10px 0;">No table allocations for this slot</div>';
        } else {
          // Table layout - match paper register style
          html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">';
          slot.tables.forEach(function(ta){
            var stus=ta.students||[];
            var present=stus.filter(function(s){return s.att_status==='present';}).length;
            var absent=stus.filter(function(s){return s.att_status==='absent';}).length;
            html+='<div style="border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;">';
            // Table header
            html+='<div style="background:var(--accent);color:#fff;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;">';
            html+='<div>';
            html+='<div style="font-weight:700;font-size:13px;">Table '+ta.table_no+'</div>';
            html+='<div style="font-size:11px;opacity:0.8;">'+(ta.teacher_name||'—')+'</div>';
            html+='</div>';
            html+='<div style="text-align:right;">';
            html+='<div style="font-size:11px;opacity:0.8;">'+(ta.subject||'—')+'</div>';
            html+='<div style="font-size:11px;">'+present+'✓ '+absent+'✗</div>';
            html+='</div></div>';
            // Students
            html+='<table style="width:100%;border-collapse:collapse;">';
            html+='<thead><tr style="background:var(--surface2);border-bottom:2px solid var(--border2);">';
            html+='<th style="padding:5px 8px;font-size:11px;text-align:left;border-bottom:1px solid var(--border2);">Ad.</th>';
            html+='<th style="padding:5px 8px;font-size:11px;text-align:left;border-bottom:1px solid var(--border2);">Student</th>';
            html+='<th style="padding:5px 8px;font-size:11px;text-align:center;border-bottom:1px solid var(--border2);">✓/✗</th>';
            html+='</tr></thead><tbody>';
            if(stus.length){
              stus.forEach(function(s){
                var rowBg=s.att_status==='present'?'rgba(34,197,94,0.07)':s.att_status==='absent'?'rgba(248,113,113,0.07)':'';
                html+='<tr style="background:'+rowBg+';border-bottom:1px solid var(--border);">';
                html+='<td style="padding:5px 8px;font-size:11px;font-family:var(--mono);color:var(--text3);">'+s.admission_id+'</td>';
                html+='<td style="padding:5px 8px;font-size:12px;">'+(s.is_catchup?'<span class="badge badge-amber" style="font-size:9px;margin-right:4px;">CU</span>':'')+s.student_name+'</td>';
                html+='<td style="padding:5px 8px;text-align:center;">'+attBadge(s.att_status)+'</td>';
                html+='</tr>';
              });
              // Empty rows up to max
              for(var i=stus.length;i<ta.max_students;i++){
                html+='<tr style="border-bottom:1px solid var(--border);"><td style="padding:5px 8px;">&nbsp;</td><td style="padding:5px 8px;">&nbsp;</td><td style="padding:5px 8px;">&nbsp;</td></tr>';
              }
            } else {
              html+='<tr><td colspan="3" style="padding:10px 8px;color:var(--text3);font-size:12px;">No students</td></tr>';
            }
            html+='</tbody></table>';
            html+='</div>';
          });
          html+='</div>'; // end grid
        }
        html+='</div>'; // end slot card
      });

      // Day summary table (like Excel summary sheet)
      html+='<div class="card" style="margin-top:4px;">';
      html+='<div class="card-header"><div class="card-title">Day summary</div></div>';
      html+='<div class="table-wrap"><table>';
      html+='<thead><tr><th>Slot</th><th>Teachers</th><th>Tables used</th><th>Tables free</th><th>Students</th><th>Max (8×5)</th><th>Util %</th></tr></thead>';
      html+='<tbody>';
      report.slots.forEach(function(slot){
        var teachers=[...new Set((slot.tables||[]).map(function(t){return t.teacher_name||'—';}))].join(', ');
        var free=8-slot.tables_used;
        var util=Math.round((slot.total_students||0)/40*100);
        html+='<tr>';
        html+='<td><strong>'+slot.slot+'</strong></td>';
        html+='<td style="font-size:12px;">'+teachers+'</td>';
        html+='<td style="text-align:center;">'+slot.tables_used+'</td>';
        html+='<td style="text-align:center;color:var(--success-text);">'+free+'</td>';
        html+='<td style="text-align:center;font-weight:600;">'+slot.total_students+'</td>';
        html+='<td style="text-align:center;color:var(--text3);">40</td>';
        html+='<td><strong>'+(util>80?'<span style="color:var(--success-text);">':'<span style="color:var(--text3);">')+util+'%</span></strong></td>';
        html+='</tr>';
      });
      html+='<tr style="background:var(--surface2);font-weight:700;">';
      html+='<td>DAY TOTAL</td><td></td><td style="text-align:center;">'+report.slots.reduce(function(t,s){return t+s.tables_used;},0)+'</td><td></td>';
      html+='<td style="text-align:center;">'+grandTotal+'</td><td style="text-align:center;color:var(--text3);">'+( report.slots.length*40)+'</td>';
      html+='<td><strong>'+Math.round(grandTotal/(report.slots.length*40||1)*100)+'%</strong></td>';
      html+='</tr>';
      html+='</tbody></table></div></div>';
    }
  }

  // ── SINGLE SESSION ──
  else{
    var sessOpts='<option value="">— choose session —</option>';
    sessions.forEach(function(s){
      sessOpts+='<option value="'+s.id+'" '+(s.id===selId?'selected':'')+'>'+new Date(s.date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+' · '+s.slot+' · '+(s.branch_name||'')+' · '+(s.staff_name||'?')+'</option>';
    });
    html+='<div class="card" style="margin-bottom:16px;">';
    html+='<div class="field"><label>Select session</label><select id="sr-select">'+sessOpts+'</select></div>';
    html+='</div>';
    if(sel){
      var attRecs=state.data['sr_att_'+selId]||[];
      var progRecs=state.data['sr_prog_'+selId]||[];
      html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;">';
      html+='<div class="metric-card"><div class="metric-label">Date</div><div class="metric-value" style="font-size:14px;">'+new Date(sel.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+'</div></div>';
      html+='<div class="metric-card"><div class="metric-label">Slot</div><div class="metric-value" style="font-size:13px;">'+sel.slot+'</div></div>';
      html+='<div class="metric-card"><div class="metric-label">Present</div><div class="metric-value" style="color:var(--success-text);">'+attRecs.filter(function(a){return a.status==='present';}).length+'/'+attRecs.length+'</div></div>';
      html+='<div class="metric-card"><div class="metric-label">Notes</div><div class="metric-value" style="color:var(--accent-text);">'+progRecs.length+'</div></div>';
      html+='</div>';
    }
  }
  return html;
}


function renderStaffTimesheets(){
  const summary=state.data.staff_att_summary||[];
  const records=state.data.staff_att||[];
  const tab=state.staffAttTab||'summary';
  const month=state.staffAttMonth||new Date().toISOString().slice(0,7);
  const sessions=state.data.sessions||[];
  const staffList=state.data.staff||[];

  const totalPresent=summary.reduce((s,r)=>s+(r.present||0),0);
  const totalAbsent=summary.reduce((s,r)=>s+(r.absent||0),0);
  const totalLate=summary.reduce((s,r)=>s+(r.late||0),0);
  const totalNoSignOut=summary.reduce((s,r)=>s+(r.no_sign_out||0),0);
  const totalHours=summary.reduce((s,r)=>s+(parseFloat(r.total_clock_hours)||parseFloat(r.total_hours)||0),0);const totalPaidHours=summary.reduce((s,r)=>s+(parseFloat(r.total_paid_hours)||0),0);

  // Filter states
  const filterStaff=state.tsFilterStaff||'';
  const filterRole=state.tsFilterRole||'';
  const filterStatus=state.tsFilterStatus||'';
  const filterDate=state.tsFilterDate||'';

  // Get unique roles from staff list
  const roles=[...new Set(staffList.map(s=>s.role).filter(Boolean))].sort();

  // Apply filters to summary
  const filteredSummary=summary.filter(function(r){
    if(filterStaff&&r.name!==filterStaff) return false;
    if(filterRole&&r.role!==filterRole) return false;
    return true;
  });

  // Apply filters to records (full log)
  const filteredRecords=records.filter(function(r){
    if(filterStaff&&(r.staff_name||'')!==filterStaff) return false;
    if(filterRole&&r.staff_role!==filterRole) return false;
    if(filterStatus&&r.status!==filterStatus) return false;
    if(filterDate&&r.date!==filterDate) return false;
    return true;
  });

  function statusBadge(s){
    if(s==='present')  return`<span class="badge badge-success">Present</span>`;
    if(s==='absent')   return`<span class="badge badge-danger">Absent</span>`;
    if(s==='late')     return`<span class="badge badge-amber">Late</span>`;
    if(s==='no_sign_out') return`<span class="badge" style="background:rgba(168,85,247,0.12);color:var(--purple-text);border:1px solid rgba(168,85,247,0.2);">No sign-out</span>`;
    return`<span class="badge badge-gray">${s}</span>`;
  }

  return`
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
    <div><div class="section-title">Staff timesheets</div><div class="section-sub">Sign-in/sign-out records, hours, and absence tracking</div></div>
    <div style="display:flex;gap:10px;align-items:center;">
      <input type="month" id="staff-att-month" value="${month}" style="border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-family:var(--font);font-size:13px;background:var(--surface2);color:var(--text);outline:none;">
      <button class="btn btn-primary" data-action="add-staff-att">+ Log attendance</button>
    </div>
  </div>

  <div class="metrics-grid">
    <div class="metric-card"><div class="metric-icon" style="background:var(--success-bg);">${icoCheck(18)}</div><div class="metric-label">Sessions attended</div><div class="metric-value">${totalPresent}</div><div class="metric-sub">This month</div></div>
    <div class="metric-card"><div class="metric-icon" style="background:var(--danger-bg);">${icoX(18)}</div><div class="metric-label">Absences</div><div class="metric-value" style="color:var(--danger-text);">${totalAbsent}</div><div class="metric-sub">This month</div></div>
    <div class="metric-card"><div class="metric-icon" style="background:var(--amber-bg);">${icoClock(18)}</div><div class="metric-label">Late arrivals</div><div class="metric-value" style="color:var(--amber-text);">${totalLate}</div><div class="metric-sub">+ ${totalNoSignOut} no sign-out</div></div>
    <div class="metric-card"><div class="metric-icon" style="background:var(--accent-bg);">${icoClipboard(18)}</div><div class="metric-label">Clock hours</div><div class="metric-value" style="color:var(--text3);">${totalHours.toFixed(1)}</div><div class="metric-sub">Total time logged</div><div class="metric-sub">Logged this month</div></div>
    <div class="metric-card" style="border-top:3px solid var(--purple);"><div class="metric-label">Paid hours</div><div class="metric-value" style="color:var(--purple-text);">${totalPaidHours.toFixed(1)}</div><div class="metric-sub">After break deductions</div></div>
  </div>

  <div class="tab-bar">
    <div class="tab ${tab==='summary'?'active':''}" data-action="staff-att-tab" data-tab="summary">Summary by staff</div>
    <div class="tab ${tab==='log'?'active':''}" data-action="staff-att-tab" data-tab="log">Full log (${filteredRecords.length})</div>
    <div class="tab ${tab==='flags'?'active':''}" data-action="staff-att-tab" data-tab="flags">Flags & alerts</div>
  </div>

  <div class="card" style="margin-bottom:14px;padding:12px 16px;">
    <div class="form-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;align-items:end;">
      <div class="field" style="margin:0;"><label style="font-size:11px;">Month</label>
        <input type="month" id="sa-month" value="${month}" style="width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">
      </div>
      <div class="field" style="margin:0;"><label style="font-size:11px;">Staff member</label>
        <select id="ts-filter-staff" style="width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">
          <option value="">All staff</option>
          ${staffList.map(s=>`<option value="${s.name}" ${s.name===filterStaff?'selected':''}>${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="margin:0;"><label style="font-size:11px;">Role</label>
        <select id="ts-filter-role" style="width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">
          <option value="">All roles</option>
          ${roles.map(r=>`<option value="${r}" ${r===filterRole?'selected':''}>${r}</option>`).join('')}
        </select>
      </div>
      <div class="field" style="margin:0;"><label style="font-size:11px;">Status</label>
        <select id="ts-filter-status" style="width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">
          <option value="">All statuses</option>
          <option value="present" ${filterStatus==='present'?'selected':''}>Present</option>
          <option value="absent" ${filterStatus==='absent'?'selected':''}>Absent</option>
          <option value="late" ${filterStatus==='late'?'selected':''}>Late</option>
          <option value="no_sign_out" ${filterStatus==='no_sign_out'?'selected':''}>No sign-out</option>
        </select>
      </div>
      <div class="field" style="margin:0;"><label style="font-size:11px;">Specific date</label>
        <input type="date" id="ts-filter-date" value="${filterDate}" style="width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button class="btn btn-sm" data-action="ts-clear-filters" style="width:100%;">✕ Clear</button>
      </div>
    </div>
  </div>

  ${tab==='summary'?`
  <div class="card" style="padding:0;overflow:hidden;"><div class="table-wrap"><table>
    <div style="margin-bottom:12px;padding:10px 14px;background:rgba(167,139,250,0.1);border-radius:var(--radius);border-left:4px solid var(--purple);font-size:12px;color:var(--text2);"><strong style="color:var(--purple-text);">Unpaid break deductions:</strong> Weekend full day (after 16:15): −1h 30min · Morning (13:15–16:15): −1h 15min · Slot 2 only (11:15–13:15): −15 min · Afternoon only (14:00+, after 16:15): −15 min · Weekdays: none</div>
    <thead><tr><th>Staff member</th><th>Branch</th><th>Role</th><th>Present</th><th>Absent</th><th>Late</th><th>No sign-out</th><th>Clock hrs</th><th>Paid hrs</th><th>Actions</th></tr></thead>
    <tbody>${filteredSummary.map(r=>`<tr>
      <td><div style="display:flex;align-items:center;gap:10px;"><div class="avatar av-teal" style="width:30px;height:30px;font-size:11px;">${avatarInitials(r.name)}</div><strong>${r.name}</strong></div></td>
      <td><span class="badge badge-accent">${r.branch_name}</span></td>
      <td>${roleBadge(r.role==='teacher'?'teacher':'receptionist')}</td>
      <td><span class="badge badge-success">${r.present||0}</span></td>
      <td><span class="badge ${r.absent>0?'badge-danger':'badge-gray'}">${r.absent||0}</span></td>
      <td><span class="badge ${r.late>0?'badge-amber':'badge-gray'}">${r.late||0}</span></td>
      <td><span class="badge ${r.no_sign_out>0?'badge-purple':'badge-gray'}">${r.no_sign_out||0}</span></td>
      <td><strong style="color:var(--text3);">${r.total_hours||r.total_clock_hours||'0.0'}h</strong></td><td><strong style="color:var(--purple-text);">${r.total_paid_hours!=null?r.total_paid_hours+'h':'—'}</strong></td>
      <td><button class="btn btn-sm" data-action="export-staff-timesheet" data-id="${r.id}">Export</button></td>
    </tr>`).join('')||`<tr><td colspan="9"><div class="empty-state">No records for this month</div></td></tr>`}</tbody>
  </table></div></div>` : ''}

  ${tab==='log'?`
  <div class="card" style="padding:0;overflow:hidden;"><div class="table-wrap"><table>
    <thead><tr>
      <th>Date</th><th>Staff</th><th>Branch</th><th>Role</th>
      <th>Sign in</th><th>Sign out</th><th>Clock hrs</th><th>Paid hrs</th>
      <th>Status</th><th>Session</th><th>Notes</th><th></th>
    </tr></thead>
    <tbody>${(function(){
      if(!filteredRecords.length) return '<tr><td colspan="12"><div class="empty-state">No records for this period</div></td></tr>';

      // Group by date+staff for summary rows
      const groups={};
      const groupOrder=[];
      filteredRecords.forEach(function(r){
        const key=r.date+'|'+r.staff_name;
        if(!groups[key]){groups[key]=[];groupOrder.push(key);}
        groups[key].push(r);
      });

      let html='';
      groupOrder.forEach(function(key){
        const recs=groups[key];
        const first=recs[0];
        const totalClock=recs.reduce(function(t,r){
          if(!r.sign_in||!r.sign_out) return t;
          try{const a=r.sign_in.slice(0,5).split(':');const b=r.sign_out.slice(0,5).split(':');return t+(parseInt(b[0])*60+parseInt(b[1]))-(parseInt(a[0])*60+parseInt(a[1]));}catch(e){return t;}
        },0);
        const totalPaid=recs.reduce(function(t,r){return t+(r.paid_hours||0);},0);
        const clkStr=totalClock>0?(Math.floor(totalClock/60)+'h'+(totalClock%60?(' '+totalClock%60+'m'):'')):'—';
        const multiDay=recs.length>1;

        if(multiDay){
          // Summary row for multiple records on same date
          html+='<tr style="background:var(--surface2);">';
          html+='<td><strong>'+new Date(first.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+'</strong></td>';
          html+='<td><strong>'+first.staff_name+'</strong></td>';
          html+='<td><span class="badge badge-accent">'+first.branch_name+'</span></td>';
          html+='<td style="font-size:12px;color:var(--text3);">'+first.staff_role+'</td>';
          html+='<td style="font-size:12px;color:var(--text3);" colspan="2">'+recs.length+' records</td>';
          html+='<td style="color:var(--text3);font-size:12px;">'+clkStr+'</td>';
          html+='<td><strong style="color:var(--purple-text);">'+(totalPaid>0?totalPaid.toFixed(2)+'h':'—')+'</strong></td>';
          html+='<td colspan="3"></td><td></td>';
          html+='</tr>';
        }

        // Individual rows
        recs.forEach(function(r){
          const hrs=(r.sign_in&&r.sign_out)?(function(){
            try{const a=r.sign_in.slice(0,5).split(':');const b=r.sign_out.slice(0,5).split(':');
            const m=(parseInt(b[0])*60+parseInt(b[1]))-(parseInt(a[0])*60+parseInt(a[1]));
            return Math.floor(m/60)+'h'+(m%60?(' '+m%60+'m'):'');}catch(e){return '—';}
          })():'—';
          const rowStyle=multiDay?'padding-left:20px;':'' ;
          const noSO=r.sign_in&&!r.sign_out;
          html+='<tr style="'+(noSO?'background:rgba(167,139,250,0.08);':'')+'">';
          html+='<td style="'+rowStyle+'">'+(multiDay?'↳ ':'<strong>')+new Date(r.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+(multiDay?'':'</strong>')+'</td>';
          html+='<td>'+(multiDay?'<span style="color:var(--text3);font-size:12px;">'+r.staff_name+'</span>':'<strong>'+r.staff_name+'</strong>')+'</td>';
          html+='<td><span class="badge badge-accent">'+r.branch_name+'</span></td>';
          html+='<td style="font-size:12px;color:var(--text3);">'+r.staff_role+'</td>';
          html+='<td><span style="font-family:var(--mono);font-size:12px;color:var(--success-text);">'+(r.sign_in||'—')+'</span></td>';
          html+='<td><span style="font-family:var(--mono);font-size:12px;color:'+(r.sign_out?'var(--text2)':'var(--danger-text)')+';">'+(r.sign_out||'<strong>Missing</strong>')+'</span></td>';
          html+='<td style="color:var(--text3);font-size:12px;">'+hrs+'</td>';
          html+='<td><strong style="color:var(--purple-text);">'+(r.paid_hours!=null?r.paid_hours+'h':'—')+'</strong></td>';
          html+='<td>'+((r.status==='present'?'<span class="badge badge-success">Present</span>':r.status==='absent'?'<span class="badge badge-danger">Absent</span>':r.status==='late'?'<span class="badge badge-amber">Late</span>':'<span class="badge badge-gray">'+r.status+'</span>'))+'</td>';
          html+='<td style="font-size:11px;color:var(--text3);">'+(r.slot||r.session_subject||'—')+'</td>';
          html+='<td style="font-size:12px;color:var(--text3);">'+(r.notes||'—')+'</td>';
          html+='<td><div class="row-actions">';
          html+='<button class="btn btn-sm" data-action="edit-staff-att" data-id="'+r.id+'">Edit</button>';
          html+='<button class="btn btn-sm btn-danger" data-action="del-staff-att" data-id="'+r.id+'">Del</button>';
          html+='</div></td>';
          html+='</tr>';
        });
      });
      return html;

function calcHours(sin, sout){
  try{
    const[h1,m1]=sin.split(':').map(Number);
    const[h2,m2]=sout.split(':').map(Number);
    const mins=(h2*60+m2)-(h1*60+m1);
    if(mins<=0)return'—';
    return(mins/60).toFixed(1)+'h';
  }catch(e){return'—';}
}


function renderAccountsTab(){
  const sm=state.data.payment_summary||{};
  const methods=sm.by_method||[];
  const byMonth=sm.by_month||[];
  const allPayments=state.data.payments||[];
  const colors={cash:'var(--success)',bank_transfer:'var(--accent)',card:'var(--teal)',direct_debit:'var(--purple)',standing_order:'var(--amber)',cheque:'var(--blue)',other:'var(--text3)'};
  const labels={cash:'Cash',bank_transfer:'Bank Transfer',card:'Card',direct_debit:'Direct Debit',standing_order:'Standing Order',cheque:'Cheque',other:'Other'};
  const icons={cash:'💵',bank_transfer:'🏦',card:'💳',direct_debit:'🔄',standing_order:'📅',cheque:'📋',other:'💰'};

  // Method cards
  let cards='';
  if(!methods.length){
    cards='<div class="empty-state" style="grid-column:1/-1;padding:40px;">No payments recorded yet</div>';
  } else {
    methods.forEach(m=>{
      cards+=`<div class="metric-card" style="cursor:pointer;border-top:3px solid ${colors[m.method]||'var(--text3)'};" data-action="fin-method-filter" data-method="${m.method}">
        <div style="font-size:24px;margin-bottom:8px;">${icons[m.method]||'💰'}</div>
        <div class="metric-label">${labels[m.method]||m.method}</div>
        <div class="metric-value" style="color:${colors[m.method]||'var(--text)'};">£${(m.total||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div class="metric-sub">${m.count} payment${m.count!==1?'s':''}</div>
      </div>`;
    });
  }

  // Monthly breakdown
  const mts=['cash','bank_transfer','card','direct_debit','standing_order','cheque'];
  const months={};
  byMonth.forEach(r=>{if(!months[r.month])months[r.month]={};months[r.month][r.method]=r.total||0;});
  const sorted=Object.keys(months).sort().reverse();
  let monthRows='';
  if(!sorted.length){
    monthRows='<tr><td colspan="8"><div class="empty-state">No data</div></td></tr>';
  } else {
    sorted.forEach(m=>{
      const row=months[m];
      const total=mts.reduce((s,mt)=>s+(row[mt]||0),0);
      monthRows+=`<tr><td><strong>${m}</strong></td>${mts.map(mt=>row[mt]?`<td style="color:var(--success-text);font-weight:500;">£${row[mt].toFixed(2)}</td>`:'<td style="color:var(--text3);">—</td>').join('')}<td><strong>£${total.toFixed(2)}</strong></td></tr>`;
    });
  }

  // Detailed ledger for selected method
  let ledger='';
  if(state.finMethod){
    const filtered=allPayments.filter(p=>p.method===state.finMethod);
    const total=filtered.reduce((s,p)=>s+p.amount,0);
    const methodLabel=labels[state.finMethod]||state.finMethod;
    let rows='';
    filtered.forEach(p=>{
      rows+=`<tr>
        <td style="font-family:var(--mono);font-size:12px;">${new Date(p.payment_date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</td>
        <td><strong>${p.student_name}</strong></td>
        <td><span class="id-code">${p.admission_id}</span></td>
        <td><strong style="color:var(--success-text);">£${p.amount.toFixed(2)}</strong></td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--text3);">${p.reference||'—'}</td>
        <td style="font-size:12px;color:var(--text3);">${p.notes||'—'}</td>
      </tr>`;
    });
    if(!rows) rows='<tr><td colspan="6"><div class="empty-state">No transactions</div></td></tr>';
    ledger=`<div class="card" style="border-top:3px solid var(--success);">
      <div class="card-header">
        <div><div class="card-title">${methodLabel} — detailed ledger</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px;">${filtered.length} transactions · Total: £${total.toFixed(2)}</div></div>
        <button class="btn btn-sm" data-action="fin-method-filter" data-method="">Clear filter</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Student</th><th>ID</th><th>Amount</th><th>Reference</th><th>Notes</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }

  return `<div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px;">${cards}</div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-header"><div class="card-title">Monthly breakdown by method</div></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Month</th><th>Cash</th><th>Bank Transfer</th><th>Card</th><th>Direct Debit</th><th>Standing Order</th><th>Cheque</th><th>Total</th></tr></thead>
        <tbody>${monthRows}</tbody>
      </table></div>
    </div>
    ${ledger}
  </div>`;
}

function renderMgmtReports(){
  const tab=state.mgmtTab||'summary';
  const summary=state.data.mgmt_summary||{};
  const daily=state.data.mgmt_daily||{};
  const monthly=state.data.mgmt_monthly||{};
  const yearly=state.data.mgmt_yearly||{};

  function pct(a,b){return b?Math.round(a/b*100):0;}
  function fmtHrs(h){if(!h)return '0h';const hrs=Math.floor(h);const mins=Math.round((h-hrs)*60);return hrs+'h'+(mins?(' '+mins+'m'):'');}
  function fmtGBP(n){return '£'+(n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});}

  // Export CSV helper
  function exportCSV(rows, filename){
    const csv=rows.map(r=>r.map(c=>(typeof c==='string'&&c.includes(','))?'"'+c+'"':c).join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download=filename;a.click();
  }

  let html='';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">';
  html+='<div><div class="section-title">Management reports</div>';
  html+='<div class="section-sub">Summary, daily, monthly and yearly performance reports</div></div>';
  html+='</div>';

  // Tab bar
  html+='<div class="tab-bar" style="margin-bottom:20px;">';
  html+='<div class="tab '+(tab==='summary'?'active':'')+'" data-action="mgmt-tab" data-tab="summary">Summary</div>';
  html+='<div class="tab '+(tab==='daily'?'active':'')+'" data-action="mgmt-tab" data-tab="daily">Daily</div>';
  html+='<div class="tab '+(tab==='monthly'?'active':'')+'" data-action="mgmt-tab" data-tab="monthly">Monthly</div>';
  html+='<div class="tab '+(tab==='yearly'?'active':'')+'" data-action="mgmt-tab" data-tab="yearly">Yearly</div>';
  html+='</div>';

  // ── SUMMARY TAB ──
  if(tab==='summary'){
    html+='<div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;">';
    html+='<div class="field" style="margin:0;"><label style="font-size:12px;">Academic year</label>';
    html+='<select id="mgmt-year-select" style="border:1px solid var(--border2);border-radius:var(--radius);padding:7px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">';
    const curYr=new Date().getMonth()>=8?new Date().getFullYear():new Date().getFullYear()-1;
    for(let y=curYr;y>=curYr-3;y--){
      html+='<option value="'+y+'" '+(String(state.mgmtYear||curYr)===String(y)?'selected':'')+'>'+(y)+'–'+(y+1)+'</option>';
    }
    html+='</select></div>';
    html+='<button class="btn btn-sm" data-action="export-mgmt-summary">⬇ Export Excel</button>';
    html+='</div>';

    if(summary.academic_year){
      html+='<div style="margin-bottom:6px;font-size:13px;color:var(--text3);">Academic year: <strong style="color:var(--text);">'+summary.academic_year+'</strong> ('+summary.yr_from+' to '+summary.yr_to+')</div>';
      html+='<div class="metrics-grid" style="margin-bottom:20px;">';
      html+='<div class="metric-card" style="border-top:3px solid var(--accent);"><div class="metric-label">Active students</div><div class="metric-value">'+summary.active_students+'</div><div class="metric-sub">'+summary.new_enrolments+' new this year</div></div>';
      html+='<div class="metric-card" style="border-top:3px solid var(--teal);"><div class="metric-label">Sessions delivered</div><div class="metric-value">'+summary.total_sessions+'</div><div class="metric-sub">This academic year</div></div>';

    // Sessions table

      dsess.forEach(function(s){
        html+='<tr><td>'+s.slot+'</td><td>'+( s.staff_name||'—')+'</td><td>'+(s.cover_name?'<span class="badge badge-amber">'+s.cover_name+'</span>':'—')+'</td><td>'+( s.subject||'—')+'</td><td>'+( s.table_no||'—')+'</td>';
        html+='<td style="color:var(--success-text);font-weight:600;">'+(s.present||0)+'</td>';
        html+='<td style="color:var(--danger-text);font-weight:600;">'+(s.absent||0)+'</td>';
        html+='<td>'+(s.total_marked||0)+'</td></tr>';
      });
      html+='</tbody></table></div></div>';
    }

    // Staff hours table
    if(dsatt.length){
      html+='<div class="card"><div class="card-header"><div class="card-title">Staff hours</div></div>';
      html+='<div class="table-wrap"><table><thead><tr><th>Staff member</th><th>Role</th><th>Sign in</th><th>Sign out</th><th>Hours</th><th>Status</th></tr></thead><tbody>';

      html+='</tbody></table></div></div>';
    }

    html+='<div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;">';

        const rate=pct(m.present||0,(m.present||0)+(m.absent||0));

        html+='<td style="color:var(--success-text);">'+(m.present||0)+'</td>';
        html+='<td style="color:var(--danger-text);">'+(m.absent||0)+'</td>';
        html+='<td><strong>'+(rate||0)+'%</strong></td></tr>';
      });
      html+='</tbody></table></div></div>';
    }

    // Staff yearly hours
    if(ystaff.length){
      html+='<div class="card" style="margin-bottom:16px;"><div class="card-header"><div class="card-title">Staff hours — full year</div></div>';
      html+='<div class="table-wrap"><table><thead><tr><th>Staff member</th><th>Role</th><th>Sessions worked</th><th>Total hours</th></tr></thead><tbody>';
      ystaff.forEach(function(s){
        html+='<tr><td><strong>'+s.name+'</strong></td><td>'+s.role+'</td><td>'+s.sessions_worked+'</td>';
        html+='<td><strong style="color:var(--purple-text);">'+fmtHrs(s.total_hours||0)+'</strong></td></tr>';
      });
      const grandTotal=ystaff.reduce(function(t,s){return t+(s.total_hours||0);},0);
      html+='<tr style="background:var(--surface2);"><td colspan="3" style="font-weight:700;">TOTAL</td><td><strong style="color:var(--purple-text);">'+fmtHrs(grandTotal)+'</strong></td></tr>';
      html+='</tbody></table></div></div>';
    }

    // Monthly fees
    if(yfees.length){
      html+='<div class="card"><div class="card-header"><div class="card-title">Monthly financial summary</div></div>';
      html+='<div class="table-wrap"><table><thead><tr><th>Month</th><th>Collected</th><th>Outstanding</th><th>Total</th></tr></thead><tbody>';
      let totC=0,totO=0;
      yfees.forEach(function(f){
        totC+=f.collected;totO+=f.outstanding;
        html+='<tr><td><strong>'+f.month+'</strong></td>';
        html+='<td style="color:var(--success-text);font-weight:500;">'+fmtGBP(f.collected)+'</td>';
        html+='<td style="color:var(--danger-text);font-weight:500;">'+fmtGBP(f.outstanding)+'</td>';
        html+='<td><strong>'+fmtGBP(f.collected+f.outstanding)+'</strong></td></tr>';
      });
      html+='<tr style="background:var(--surface2);"><td style="font-weight:700;">TOTAL</td>';
      html+='<td style="color:var(--success-text);font-weight:700;">'+fmtGBP(totC)+'</td>';
      html+='<td style="color:var(--danger-text);font-weight:700;">'+fmtGBP(totO)+'</td>';
      html+='<td><strong>'+fmtGBP(totC+totO)+'</strong></td></tr>';
      html+='</tbody></table></div></div>';
    }
  }

  return html;
}

function renderCatchup(){
  const owed=state.data.catchup_owed||[];
  const scheduled=state.data.catchup_scheduled||[];
  const completed=state.data.catchup_completed||[];
  const sessions=state.data.sessions||[];
  const students=state.data.students||[];
  const tab=state.catchupTab||'owed';

  function statusBadge(s){
    if(s==='owed') return '<span class="badge badge-danger">Owed</span>';
    if(s==='scheduled') return '<span class="badge badge-amber">Scheduled</span>';
    if(s==='completed') return '<span class="badge badge-success">Completed</span>';
    return '<span class="badge badge-gray">'+s+'</span>';
  }

  function buildTable(list, showActions){
    if(!list.length) return '<div class="empty-state" style="padding:30px;">No catch-up lessons in this category</div>';
    let rows='';
    list.forEach(function(c){
      rows+='<tr>';
      rows+='<td><strong>'+c.student_name+'</strong></td>';
      rows+='<td><span class="id-code">'+c.admission_id+'</span></td>';
      rows+='<td><span class="badge badge-gray">'+(c.subject||'—')+'</span></td>';
      rows+='<td style="font-size:12px;">'+(c.missed_date||'—')+'</td>';
      rows+='<td>'+(c.missed_slot||'—')+'</td>';
      rows+='<td>'+statusBadge(c.status)+'</td>';
      rows+='<td style="font-size:12px;color:var(--text3);">'+(c.catchup_date_actual||c.scheduled_date||'—')+'</td>';
      rows+='<td style="font-size:12px;color:var(--text3);">'+(c.notes||'—')+'</td>';
      if(showActions){
        rows+='<td><div class="row-actions">';
        if(c.status==='owed') rows+='<button class="btn btn-sm btn-primary" data-action="schedule-catchup" data-id="'+c.id+'">Schedule</button>';
        if(c.status==='scheduled') rows+='<button class="btn btn-sm btn-success" data-action="complete-catchup" data-id="'+c.id+'">Complete</button>';
        rows+='<button class="btn btn-sm btn-danger" data-action="del-catchup" data-id="'+c.id+'">Del</button>';
        rows+='</div></td>';
      } else {
        rows+='<td></td>';
      }
      rows+='</tr>';
    });
    return rows;
  }

  let html='';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">';
  html+='<div><div class="section-title">Catch-up lessons</div>';
  html+='<div class="section-sub">Students who missed sessions and are entitled to catch-up</div></div>';
  html+='<button class="btn btn-primary" data-action="add-catchup">+ Log catch-up owed</button>';
  html+='</div>';

  // Summary cards
  html+='<div class="metrics-grid" style="margin-bottom:20px;">';
  html+='<div class="metric-card" style="border-top:3px solid var(--danger);"><div class="metric-label">Owed</div><div class="metric-value" style="color:var(--danger-text);">'+owed.length+'</div><div class="metric-sub">Pending scheduling</div></div>';
  html+='<div class="metric-card" style="border-top:3px solid var(--amber);"><div class="metric-label">Scheduled</div><div class="metric-value" style="color:var(--amber-text);">'+scheduled.length+'</div><div class="metric-sub">Awaiting completion</div></div>';
  html+='<div class="metric-card" style="border-top:3px solid var(--success);"><div class="metric-label">Completed</div><div class="metric-value" style="color:var(--success-text);">'+completed.length+'</div><div class="metric-sub">Done</div></div>';
  html+='</div>';

  // Tabs
  html+='<div class="tab-bar" style="margin-bottom:16px;">';
  html+='<div class="tab '+(tab==='owed'?'active':'')+'" data-action="catchup-tab" data-tab="owed">Owed ('+owed.length+')</div>';
  html+='<div class="tab '+(tab==='scheduled'?'active':'')+'" data-action="catchup-tab" data-tab="scheduled">Scheduled ('+scheduled.length+')</div>';
  html+='<div class="tab '+(tab==='completed'?'active':'')+'" data-action="catchup-tab" data-tab="completed">Completed ('+completed.length+')</div>';
  html+='</div>';

  const activeList = tab==='owed'?owed:tab==='scheduled'?scheduled:completed;
  html+='<div class="card" style="padding:0;overflow:hidden;">';
  html+='<div class="table-wrap"><table>';
  html+='<thead><tr><th>Student</th><th>ID</th><th>Subject</th><th>Missed date</th><th>Slot</th><th>Status</th><th>Catch-up date</th><th>Notes</th><th></th></tr></thead>';
  html+='<tbody>'+buildTable(activeList, true)+'</tbody>';
  html+='</table></div></div>';
  return html;
}

function renderTestRecords(){
  const students=state.data.students||[];
  const allTests=state.data.test_records||[];
  const selStId=state.trStudentId;
  const selStudent=students.find(s=>s.id===selStId);
  const studentTests=selStId?(state.data['tr_'+selStId]||[]):allTests;
  const tab=state.trTab||'records';
  const b=state.currentBranch;

  function passBadge(passed,score){
    if(passed===null||passed===undefined)return '';
    return passed?
      `<span class="badge badge-success">✓ Pass (${score}%)</span>`:
      `<span class="badge badge-danger">✗ Needs revision (${score}%)</span>`;
  }

  return `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
    <div><div class="section-title">Test records</div><div class="section-sub">Book/unit test results, revisions, and retests</div></div>
    <button class="btn btn-primary" data-action="add-test-record">+ Record test</button>
  </div>

  <div class="tab-bar">
    <div class="tab ${tab==='records'?'active':''}" data-action="tr-tab" data-tab="records">All tests</div>
    <div class="tab ${tab==='student'?'active':''}" data-action="tr-tab" data-tab="student">By student</div>
    <div class="tab ${tab==='needs-revision'?'active':''}" data-action="tr-tab" data-tab="needs-revision">Needs revision</div>
  </div>

  ${tab==='records'||tab==='needs-revision'?`
  <div class="card" style="padding:0;overflow:hidden;">
    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Student</th><th>ID</th><th>Subject</th><th>Book / Unit</th><th>Score</th><th>Result</th><th>Revision</th><th>Retest</th><th>Action plan</th><th></th></tr></thead>
      <tbody>${(tab==='needs-revision'?allTests.filter(t=>!t.passed):allTests).map(t=>`<tr>
        <td style="font-family:var(--mono);font-size:12px;">${new Date(t.test_date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</td>
        <td><strong>${t.student_name}</strong></td>
        <td><span class="id-code">${t.admission_id}</span></td>
        <td><span class="badge badge-gray">${t.subject}</span></td>
        <td style="color:var(--text2);">${t.book_unit}</td>
        <td><strong style="font-size:16px;color:${t.passed?'var(--success-text)':'var(--danger-text)'};">${t.score_pct}%</strong></td>
        <td>${passBadge(t.passed,t.score_pct)}</td>
        <td>${t.revision_given?'<span class="badge badge-teal">Given</span>':'<span class="badge badge-gray">—</span>'}</td>
        <td>${t.retest_score_pct!=null?passBadge(t.retest_passed,t.retest_score_pct):'<span style="color:var(--text3);font-size:12px;">—</span>'}</td>
        <td style="font-size:12px;color:var(--text3);max-width:160px;">${t.action_plan||'—'}</td>
        <td><div class="row-actions">
          <button class="btn btn-sm" data-action="edit-test-record" data-id="${t.id}">Edit</button>
          <button class="btn btn-sm btn-danger" data-action="del-test-record" data-id="${t.id}">Del</button>
        </div></td>
      </tr>`).join('')||`<tr><td colspan="11"><div class="empty-state">${tab==='needs-revision'?'No students currently need revision':'No tests recorded yet'}</div></td></tr>`}
      </tbody>
    </table></div>
  </div>`:''}

  ${tab==='student'?`
  <div class="card" style="margin-bottom:16px;">
    <div class="field"><label>Select student</label>
    <select id="tr-student-select">
      <option value="">— all students —</option>
      ${students.map(s=>`<option value="${s.id}" ${s.id===selStId?'selected':''}>${s.admission_id} — ${s.name}</option>`).join('')}
    </select></div>
  </div>
  ${selStudent?`
  <div class="card" style="margin-bottom:16px;border-left:3px solid var(--accent);">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div class="avatar av-teal" style="width:40px;height:40px;font-size:14px;">${avatarInitials(selStudent.name)}</div>
      <div><div style="font-size:16px;font-weight:700;">${selStudent.name}</div>
      <div style="margin-top:3px;"><span class="id-code">${selStudent.admission_id}</span> <span class="badge badge-gray">${selStudent.year_group}</span></div></div>
      <div style="margin-left:auto;text-align:right;">
        <div style="font-size:12px;color:var(--text3);">Tests passed</div>
        <div style="font-size:22px;font-weight:700;color:var(--success-text);">${studentTests.filter(t=>t.passed).length}/${studentTests.length}</div>
      </div>
    </div>
    ${studentTests.length?studentTests.map(t=>`
    <div style="padding:14px;margin-bottom:10px;background:var(--surface2);border-radius:var(--radius);border-left:4px solid ${t.passed?'var(--success)':'var(--danger)'};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div>
          <span class="badge badge-gray" style="margin-right:6px;">${t.subject}</span>
          <strong>${t.book_unit}</strong>
          <span style="font-size:12px;color:var(--text3);margin-left:8px;">${new Date(t.test_date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>
        </div>
        <div style="font-size:24px;font-weight:700;color:${t.passed?'var(--success-text)':'var(--danger-text)'};">${t.score_pct}%</div>
      </div>
      ${!t.passed?`<div style="font-size:12px;margin-bottom:6px;">
        ${t.revision_given?'<span style="color:var(--teal-text);">✓ Revision given</span>':'<span style="color:var(--amber-text);">⚠ Revision pending</span>'}
        ${t.retest_score_pct!=null?` · Retest: <strong style="color:${t.retest_passed?'var(--success-text)':'var(--danger-text)'};">${t.retest_score_pct}%</strong> ${t.retest_passed?'✓ Passed':'✗ Failed'}`:' · No retest yet'}
      </div>`:''}
      ${t.action_plan?`<div style="font-size:12px;color:var(--text2);padding:6px 10px;background:var(--surface3);border-radius:6px;">📋 ${t.action_plan}</div>`:''}
    </div>`).join(''):'<p style="color:var(--text3);font-size:13px;padding:10px 0;">No tests recorded for this student yet</p>'}
  </div>`:''}
  `:''}`;
}

function modalAddFeeInvoice(){
  const students=state.data.students||[];
  const branches=state.data.branches||[];
  const defBranch=state.currentBranch||branches[0]?.id||'';
  let studOpts='<option value="">— select student —</option>';
  students.filter(s=>s.status==='active').forEach(function(s){
    studOpts+='<option value="'+s.id+'">'+s.admission_id+' — '+s.name+'</option>';
  });
  let brOpts='';
  branches.forEach(function(b){brOpts+='<option value="'+b.id+'" '+(b.id==defBranch?'selected':'')+'>'+b.name+'</option>';});
  const today=new Date().toISOString().slice(0,7);
  const footer='<button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">Issue invoice</button>';
  return mWrap('Add fee invoice','<div class="form-grid">'+
    '<div class="field"><label>Student</label><select id="f-student-id">'+studOpts+'</select></div>'+
    '<div class="field"><label>Branch</label><select id="f-branch">'+brOpts+'</select></div>'+
    '<div class="field"><label>Fee type</label><select id="f-fee-type">'+
      '<option value="monthly_fee">Monthly fee</option>'+
      '<option value="opening_balance">Opening balance (brought forward)</option>'+
      '<option value="admission_fee">Admission fee</option>'+
      '<option value="book_fee">Book fee</option>'+
      '<option value="past_papers_fee">Past papers fee</option>'+
      '<option value="miscellaneous">Miscellaneous</option>'+
    '</select></div>'+
    '<div class="field"><label>Amount (£)</label><input type="number" id="f-amount" placeholder="0.00" step="0.01" min="0"></div>'+
    '<div class="field"><label>Month</label><input type="month" id="f-month" value="'+today+'"></div>'+
    '<div class="field"><label>Due date</label><input type="date" id="f-due-date" value="'+new Date().toISOString().slice(0,10)+'"></div>'+
    '<div class="field" style="grid-column:1/-1;"><label>Description / notes</label><input type="text" id="f-notes" placeholder="e.g. KS3 Maths book set, Admission pack, Bond papers..."></div>'+
    '</div>',footer);
}

function modalMarkPaid(){
  const inv=state.editTarget||{};
  const feeLabels={monthly_fee:'Monthly fee',opening_balance:'Opening balance',admission_fee:'Admission fee',book_fee:'Book fee',past_papers_fee:'Past papers fee',miscellaneous:'Miscellaneous'};
  const total=parseFloat(inv.amount||0);
  const alreadyPaid=parseFloat(inv.amount_paid||0);
  const balance=Math.round((total-alreadyPaid)*100)/100;
  const footer='<button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">Record payment</button>';
  return mWrap('Record invoice payment','<div style="margin-bottom:16px;padding:12px;background:var(--surface2);border-radius:var(--radius);font-size:13px;color:var(--text2);">'+
    'Student: <strong style="color:var(--text);">'+inv.student_name+'</strong> <span class="id-code">'+inv.admission_id+'</span><br>'+
    (feeLabels[inv.fee_type||'monthly_fee']||'Monthly fee')+' — '+inv.month+'<br>'+
    'Total: <strong>£'+total.toFixed(2)+'</strong>'+
    (alreadyPaid>0?' &nbsp;·&nbsp; Already paid: <strong style="color:var(--success-text);">£'+alreadyPaid.toFixed(2)+'</strong>':'')+
    ' &nbsp;·&nbsp; Balance due: <strong style="color:var(--danger-text);">£'+balance.toFixed(2)+'</strong>'+
    '</div><div class="form-grid">'+
    '<div class="field"><label>Amount to record (£)</label><input type="number" id="f-pay-amount" value="'+balance.toFixed(2)+'" step="0.01" min="0.01" max="'+balance.toFixed(2)+'">'+
    '<div style="font-size:11px;color:var(--text3);margin-top:4px;">Enter less than the balance to record a part payment — the invoice will show as Partial with the remaining balance.</div></div>'+
    '<div class="field"><label>Payment method</label><select id="f-pay-method">'+
      '<option value="cash">Cash 💵</option>'+
      '<option value="bank_transfer">Bank transfer 🏦</option>'+
      '<option value="card">Card 💳</option>'+
      '<option value="direct_debit">Direct debit 🔄</option>'+
      '<option value="standing_order">Standing order 📅</option>'+
      '<option value="cheque">Cheque 📋</option>'+
      '<option value="other">Other 💰</option>'+
    '</select></div>'+
    '<div class="field"><label>Reference (optional)</label><input type="text" id="f-pay-reference" placeholder="e.g. cheque no., bank ref"></div>'+
    '<div class="field" style="grid-column:1/-1;"><label>Notes (optional)</label><input type="text" id="f-pay-notes" placeholder="Any additional notes"></div>'+
    '</div>',footer);
}

    ['Date','Slot','Branch','Teacher','Cover Teacher','Subject','Table No','Present','Absent','Total Marked'],
    ...s.map(ss=>[ss.date,ss.slot,ss.branch_name,ss.staff_name||'',ss.cover_name||'',ss.subject||'',ss.table_no||'',ss.present||0,ss.absent||0,(ss.present||0)+(ss.absent||0)])
  ];
  exportXLSX(rows, 'fth-sessions.xlsx', 'Sessions');
  return;}}


function exportStatement(stmt){
  const lines=[];
  lines.push(`FT HARLESDEN MANAGEMENT SYSTEM — STATEMENT OF ACCOUNT`);
  lines.push(``);
  lines.push(`Student:,${stmt.student.name}`);
  lines.push(`Admission ID:,${stmt.student.admission_id}`);
  lines.push(`Branch:,${stmt.student.branch_name}`);
  lines.push(`Year group:,${stmt.student.year_group}`);
  lines.push(`Date produced:,${new Date().toLocaleDateString('en-GB')}`);
  lines.push(``);
  lines.push(`Date,Description,Charged (Dr),Paid (Cr),Balance`);
  stmt.transactions.forEach(t=>{
    lines.push([
      new Date(t.date+'T00:00:00').toLocaleDateString('en-GB'),
      `"${t.description}${t.notes?' — '+t.notes:''}"`,
      t.debit>0?t.debit.toFixed(2):'',
      t.credit>0?t.credit.toFixed(2):'',
      t.balance.toFixed(2)
    ].join(','));
  });
  lines.push(``);
  lines.push(`,,Total charged:,£${stmt.summary.total_charged.toFixed(2)},`);
  lines.push(`,,Total paid:,£${stmt.summary.total_paid.toFixed(2)},`);
  lines.push(`,,Closing balance:,£${stmt.summary.closing_balance.toFixed(2)},`);
  const csv=lines.join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`Statement_${stmt.student.admission_id}_${stmt.student.name.replace(/\s+/g,'_')}.csv`;
  a.click();
  toast('Statement exported');
}
