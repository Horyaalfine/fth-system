<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT Harlesden — Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Core backgrounds - cream/warm white main area */
  --bg:#f5f0e8;--surface:#fffdf7;--surface2:#f0ebe0;--surface3:#e8e2d6;
  --border:#d4c9b8;--border2:#bfb5a4;
  /* Text - navy/blue for readability on cream */
  --text:#1a2744;--text2:#2d3f6b;--text3:#6b7a9e;
  /* Accent colours */
  --accent:#2563eb;--accent-bg:rgba(37,99,235,0.1);--accent-text:#1d4ed8;
  --success:#16a34a;--success-bg:rgba(22,163,74,0.1);--success-text:#15803d;
  --warning:#d97706;--warning-bg:rgba(217,119,6,0.1);
  --danger:#dc2626;--danger-bg:rgba(220,38,38,0.1);--danger-text:#b91c1c;
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,0.1);--purple-text:#6d28d9;
  --teal:#0d9488;--teal-bg:rgba(13,148,136,0.1);--teal-text:#0f766e;
  --amber:#b45309;--amber-bg:rgba(180,83,9,0.1);--amber-text:#92400e;
  --blue:#2563eb;--blue-bg:rgba(37,99,235,0.1);--blue-text:#1d4ed8;
  --pink:#be185d;--pink-bg:rgba(190,24,93,0.1);
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
  /* Inter font - highly readable at all sizes */
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 4px 24px rgba(26,39,68,0.1);--shadow-lg:0 8px 40px rgba(26,39,68,0.15);
  --glow:0 0 20px rgba(37,99,235,0.15);
  /* Sidebar-specific (kept dark) */
  --sb-bg:#0f2557;--sb-surface:#1a3570;--sb-surface2:#1e3d80;
  --sb-border:#2a4d9c;--sb-text:#f9fafb;--sb-text2:#d1d5db;--sb-text3:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:100vh;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(37,99,235,0.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(13,148,136,0.03) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{display:flex;min-height:100vh;position:relative;z-index:1;}
.sidebar{width:240px;background:var(--sb-bg);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:rgba(245,240,232,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.content{padding:28px;}

/* SIDEBAR */
.sidebar-brand{padding:24px 20px 20px;border-bottom:1px solid var(--sb-border);}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;margin-bottom:10px;box-shadow:0 4px 12px rgba(108,99,255,0.3);}
.brand-name{font-size:17px;font-weight:700;color:var(--sb-text);letter-spacing:-0.2px;}
.brand-sub{font-size:11px;color:var(--sb-text3);margin-top:1px;letter-spacing:0.5px;text-transform:uppercase;}
.branch-switcher{margin:12px 14px 0;background:rgba(37,99,235,0.15);border-radius:var(--radius);border:1px solid rgba(37,99,235,0.3);padding:10px 12px;}
.branch-switcher label{font-size:10px;color:#93c5fd;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:5px;}
.branch-switcher select{width:100%;background:transparent;border:none;font-family:var(--font);font-size:13px;font-weight:500;color:#f9fafb;cursor:pointer;outline:none;}
.branch-switcher select option{background:var(--sb-surface2);color:var(--sb-text);}
.nav-section{padding:12px 10px 0;flex:1;}
.nav-label{font-size:10px;color:var(--sb-text3);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:0 10px;margin:12px 0 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:var(--radius);cursor:pointer;color:var(--sb-text2);font-size:14px;font-weight:400;transition:all 0.15s;margin-bottom:2px;border:1px solid transparent;}
.nav-item:hover{background:var(--sb-surface2);color:var(--sb-text);border-color:var(--sb-border);}
.nav-item.active{background:rgba(37,99,235,0.2);color:#93c5fd;font-weight:500;border-color:rgba(37,99,235,0.3);}
.nav-item svg{flex-shrink:0;opacity:0.7;}
.nav-item.active svg{opacity:1;}
.sidebar-footer{padding:14px 12px;border-top:1px solid var(--sb-border);}
.user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);background:var(--sb-surface2);border:1px solid var(--sb-border);}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.av-purple{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;}
.av-blue{background:linear-gradient(135deg,var(--blue),var(--accent));color:#fff;}
.av-teal{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;}
.av-amber{background:linear-gradient(135deg,var(--amber),var(--pink));color:#fff;}

/* TOPBAR */
.page-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.3px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.02em;}
.badge-purple{background:#ffffff;color:#111827;border:1px solid #d1d5db;}
.badge-blue{background:var(--blue-bg);color:var(--blue-text);border:1px solid rgba(59,130,246,0.2);}
.badge-teal{background:var(--teal-bg);color:var(--teal-text);border:1px solid rgba(20,184,166,0.2);}
.badge-amber{background:var(--amber-bg);color:var(--amber-text);border:1px solid rgba(245,158,11,0.2);}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.badge-success{background:var(--success-bg);color:var(--success-text);border:1px solid rgba(34,197,94,0.2);}
.badge-danger{background:var(--danger-bg);color:var(--danger-text);border:1px solid rgba(239,68,68,0.2);}
.badge-accent{background:#ffffff;color:#111827;border:1px solid #d1d5db;}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;overflow:hidden;transition:border-color 0.2s;box-shadow:0 1px 4px rgba(26,39,68,0.06);}
.metric-card:hover{border-color:var(--border2);}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.metric-card:nth-child(1)::before{background:linear-gradient(90deg,var(--accent),var(--purple));}
.metric-card:nth-child(2)::before{background:linear-gradient(90deg,var(--teal),var(--blue));}
.metric-card:nth-child(3)::before{background:linear-gradient(90deg,var(--amber),var(--pink));}
.metric-card:nth-child(4)::before{background:linear-gradient(90deg,var(--success),var(--teal));}
.metric-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.metric-label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px;}
.metric-value{font-size:30px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-0.5px;}
.metric-sub{font-size:11px;color:var(--text3);margin-top:6px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;box-shadow:0 1px 4px rgba(26,39,68,0.06);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:600;color:var(--text);}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:24px;}

/* TABLES */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;font-weight:700;color:var(--text);padding:11px 14px;border-bottom:2px solid var(--border2);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;background:var(--surface2);}
th:first-child{border-radius:8px 0 0 0;}
th:last-child{border-radius:0 8px 0 0;}
td{padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text);font-size:14px;}
td strong{color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.id-code{font-family:var(--mono);font-size:11px;background:var(--accent-bg);padding:3px 8px;border-radius:6px;color:var(--accent);border:1px solid rgba(37,99,235,0.2);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn:hover{background:var(--surface3);border-color:var(--border2);color:var(--text);}
.btn-primary{background:var(--accent);color:#fff;border:none;box-shadow:0 2px 8px rgba(37,99,235,0.25);}
.btn-primary:hover{opacity:0.9;box-shadow:0 6px 16px rgba(108,99,255,0.4);transform:translateY(-1px);}
.btn-success{background:var(--success-bg);color:var(--success-text);border-color:rgba(34,197,94,0.2);}
.btn-danger{background:var(--danger-bg);color:var(--danger-text);border-color:rgba(239,68,68,0.2);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:13px;font-weight:600;color:var(--text);letter-spacing:0.01em;margin-bottom:4px;}
.field input,.field select,.field textarea{border:1.5px solid var(--border2);border-radius:var(--radius);padding:11px 14px;font-family:var(--font);font-size:14px;background:var(--surface);color:var(--text);outline:none;transition:all 0.15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.15);background:var(--surface);}
.field input::placeholder{color:var(--text3);}
.field select option{background:#fffdf7;color:#1a2744;}
select{background:#fffdf7;color:#1a2744;}select option{background:#fffdf7;color:#1a2744;}
.field .hint{font-size:11px;color:var(--text3);}

/* MODALS */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-lg{max-width:720px;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:17px;font-weight:700;color:var(--text);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface2);border-radius:0 0 var(--radius-xl) var(--radius-xl);}

/* TOAST */
.toast-container{position:fixed;bottom:28px;right:28px;z-index:200;display:flex;flex-direction:column;gap:10px;}
.toast{padding:14px 18px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;animation:slideIn 0.25s ease;display:flex;align-items:center;gap:10px;min-width:260px;box-shadow:var(--shadow);border:1px solid;}
.toast-success{background:var(--surface);color:var(--success-text);border-color:rgba(34,197,94,0.3);}
.toast-error{background:var(--surface);color:var(--danger-text);border-color:rgba(239,68,68,0.3);}
@keyframes slideIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}

/* MISC */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:220px;}
.search-wrap input{width:100%;padding-left:36px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.section-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-0.3px;}
.section-sub{font-size:13px;color:var(--text3);margin-bottom:22px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}
.dot-green{background:var(--success);}
.dot-red{background:var(--danger);}
.dot-amber{background:var(--amber);}
.empty-state{text-align:center;padding:56px 24px;color:var(--text3);}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0;}
.row-actions{display:flex;gap:6px;}
.bar-row{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:13px;border-bottom:1px solid var(--border);}
.bar-row:last-child{border-bottom:none;}
.bar-bg{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
.notice-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.notice-item:last-child{border-bottom:none;}
.notice-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.att-cell{border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all 0.15s;background:var(--surface2);}
.att-cell.present{background:var(--success-bg);border-color:rgba(34,197,94,0.3);}
.att-cell.absent{background:var(--danger-bg);border-color:rgba(239,68,68,0.3);}
.att-cell:hover{border-color:var(--accent);transform:translateY(-1px);}
.att-cell{position:relative;}
.att-remove{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:var(--danger-bg);color:var(--danger);border:none;cursor:pointer;font-size:10px;line-height:16px;text-align:center;opacity:0;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center;padding:0;}
.att-cell:hover .att-remove{opacity:1;}
.att-name{font-size:12px;font-weight:600;color:var(--text);}
.att-id{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.att-status{font-size:10px;margin-top:5px;font-weight:600;letter-spacing:0.05em;}
.sibling-badge{font-size:10px;background:var(--teal-bg);color:var(--teal-text);padding:2px 7px;border-radius:8px;font-weight:600;border:1px solid rgba(20,184,166,0.2);}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:11px 20px;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.stat-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2);}
.highlight-card{background:linear-gradient(135deg,var(--accent-bg),var(--purple-bg));border:1px solid rgba(108,99,255,0.2);border-radius:var(--radius-lg);padding:20px 24px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;}
.login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(108,99,255,0.08) 0%,transparent 70%);}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:40px;width:100%;max-width:400px;position:relative;box-shadow:var(--shadow-lg);}
.login-logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.login-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;box-shadow:0 6px 16px rgba(108,99,255,0.35);}
.login-logo{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:32px;margin-top:2px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:0.02em;}
.login-field input{width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:all 0.15s;}
.login-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.15);}
.login-field input::placeholder{color:var(--text3);}
.login-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:all 0.15s;box-shadow:0 4px 12px rgba(37,99,235,0.3);}
.login-btn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 6px 16px rgba(108,99,255,0.4);}
.login-btn.secondary{background:var(--surface2);color:var(--teal-text);border:1px solid rgba(20,184,166,0.2);box-shadow:none;margin-top:10px;}
.login-btn.secondary:hover{background:var(--teal-bg);box-shadow:none;}
.login-error{color:var(--danger-text);font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
.login-hint{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.8;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:80px;color:var(--text3);font-size:13px;}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ASSESSMENT / LEARNING PLAN SPECIFIC */
.level-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
.level-1{background:var(--success-bg);color:var(--success-text);}
.level-2{background:var(--blue-bg);color:var(--blue-text);}
.level-3{background:var(--amber-bg);color:var(--amber-text);}
.level-4{background:var(--danger-bg);color:var(--danger-text);}
.plan-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.fee-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.fee-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.fee-item-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
.fee-item-value{font-size:20px;font-weight:700;color:var(--text);margin-top:4px;}

@media(max-width:1024px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.two-col{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}

/* ── MOBILE ── */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text);flex-shrink:0;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99;}
@media(max-width:768px){
.hamburger{display:flex;}
.sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);transition:transform 0.25s ease;width:260px;}
.sidebar.open{transform:translateX(0);}
.sidebar-overlay.open{display:block;}
.main{margin-left:0 !important;}
.topbar{padding:10px 12px;}
.content{padding:12px 10px;}
.metrics-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
.metric-value{font-size:20px;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{min-width:480px;}

<script>
const API={async call(method,path,body){const opts={method,credentials:'include',headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),8000);opts.signal=controller.signal;try{const res=await fetch(path,opts);clearTimeout(timer);if(res.status===401){state.currentUser=null;state.parentUser=null;render();return null;}return res.ok?res.json():Promise.reject(await res.json());}catch(e){clearTimeout(timer);if(e.name==='AbortError')console.warn('Timeout:',path);throw e;}},get:(p,q)=>API.call('GET',q?p+'?'+new URLSearchParams(q):p),post:(p,body)=>API.call('POST',p,body),put:(p,body)=>API.call('PUT',p,body),delete:(p)=>API.call('DELETE',p)};

function exportXLSX(rows, filename, sheetName){
  try{
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const colWidths = rows[0].map(function(_, ci){
      let maxLen = 10;
      rows.forEach(function(r){ const v=r[ci]; const len=(v==null?'':String(v)).length; if(len>maxLen) maxLen=len; });
      return {wch: Math.min(40, maxLen)};
    });
    ws['!cols'] = colWidths;
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName||'Sheet1');
    XLSX.writeFile(wb, filename);
  }catch(e){
    console.error('Excel export failed:',e);
    if(typeof toast==='function') toast('Export failed: '+(e.message||e),'error');
  }
}

let state={currentUser:null,parentUser:null,currentBranch:null,page:'dashboard',modal:null,editTarget:null,data:{},loading:false,attRecords:{},attSessionId:null,sessionReportId:null,invoiceFilter:'all',studentSearch:'',regTab:'students',staffAttMonth:new Date().toISOString().slice(0,7),staffAttTab:'summary',invTab:'list',invFeeFilter:'all',invMonthFilter:'',tsFilterStaff:'',tsFilterRole:'',tsFilterStatus:'',tsFilterDate:'',lrSessionId:null,lrTab:'report',srTab:'daily',srDate:'',srMonth:'',catchupTab:'owed',sessionMonth:'',sessionDate:'',sessionSlot:'',sessionTeacher:'',sessionSubject:'',attDateFilter:'',attSlotFilter:'',attAllSessions:'',attTeacherFilter:'',attStatusFilter:'all',planSessionId:null,planMonth:'',planTab:'allocate',timetableStudentId:null,mgmtTab:'summary',mgmtDate:new Date().toISOString().slice(0,10),mgmtMonth:new Date().toISOString().slice(0,7),mgmtYear:'',trStudentId:null,trTab:'records',finStudentId:null,finTab:'statement',finMethod:null,finMonth:''};

function toast(msg,type='success'){const el=document.createElement('div');el.className=`toast toast-${type}`;el.innerHTML=(type==='success'?'<span style="color:var(--success)">✓</span> ':'<span style="color:var(--danger)">✕</span> ')+msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3500);}
function roleBadge(role){const m={super_admin:['badge-purple','Super admin'],branch_manager:['badge-blue','Branch manager'],teacher:['badge-teal','Teacher'],receptionist:['badge-amber','Receptionist']};const[cls,label]=m[role]||['badge-gray',role];return`<span class="badge ${cls}">${label}</span>`;}
function statusDot(s){return s==='active'?`<span class="dot dot-green"></span><span style="color:var(--success-text)">Active</span>`:`<span class="dot dot-red"></span><span style="color:var(--danger-text)">Inactive</span>`;}
function avatarInitials(name){return(name||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function avatarClass(role){return{super_admin:'av-purple',branch_manager:'av-blue',head_of_centre:'av-blue',supervisor:'av-teal',teacher:'av-teal',receptionist:'av-amber',admin:'av-gray'}[role]||'av-blue';}
function branchParam(){
  if(state.currentBranch) return {branch_id:state.currentBranch};
  // Non-super-admin always scoped to their branch
  const role=state.currentUser?.role;
  if(role&&role!=='super_admin'&&state.currentUser?.branch_id){
    return {branch_id:state.currentUser.branch_id};
  }
  return {};
}
function canAccess(page){
  const r=state.currentUser?.role;
  if(r==='super_admin') return true;
  if(r==='branch_manager') return['dashboard','students','staff','sessions','attendance','invoices','session_reports','lesson_reports','test_records','staff_timesheets','finance','reports','catchup','session_plan','mgmt_reports'].includes(page);
  if(r==='head_of_centre') return['dashboard','students','staff','sessions','attendance','invoices','session_reports','lesson_reports','test_records','staff_timesheets','finance','reports','catchup','session_plan','mgmt_reports'].includes(page);
  if(r==='supervisor') return['dashboard','students','sessions','attendance','session_reports','lesson_reports','test_records','staff_timesheets','catchup','session_plan'].includes(page);
  if(r==='teacher') return['dashboard','sessions','attendance','session_reports','lesson_reports','test_records','staff_timesheets'].includes(page);
  if(r==='receptionist') return['dashboard','students','sessions','attendance','invoices','finance'].includes(page);
  if(r==='admin') return['dashboard','students','sessions','attendance','invoices'].includes(page);
  return false;
}
function invBadge(s){if(s==='paid')return`<span class="badge badge-success">Paid</span>`;if(s==='overdue')return`<span class="badge badge-danger">Overdue</span>`;return`<span class="badge badge-amber">Due</span>`;}
function stars(n){return Array.from({length:5},(_,i)=>`<span style="color:${i<n?'var(--amber)':'var(--surface3)'}">★</span>`).join('');}
async function loadData(key,path,params){try{state.data[key]=await API.get(path,params||{});}catch(e){state.data[key]=state.data[key]||[];}}
async function refreshPage(){state.loading=true;render();const b=branchParam();const page=state.page;try{if(page==='dashboard'){const loads=[loadData('branches','/api/branches'),loadData('summary','/api/reports/summary',b)];if(state.currentUser?.role==='super_admin')loads.push(loadData('audit','/api/audit'));await Promise.all(loads);}else if(page==='students')await loadData('students','/api/students',{...b,q:state.studentSearch});else if(page==='staff')await loadData('staff','/api/staff',b);else if(page==='sessions')await loadData('sessions','/api/sessions',b);else if(page==='attendance'){await Promise.all([loadData('sessions','/api/sessions',b),loadData('students','/api/students',b)]);if(state.attSessionId){await Promise.all([loadData('attendance_'+state.attSessionId,'/api/attendance/'+state.attSessionId),loadData('sess_students_'+state.attSessionId,'/api/sessions/'+state.attSessionId+'/students')]);const att=state.data['attendance_'+state.attSessionId]||[];att.forEach(function(a){if(!state.attRecords[state.attSessionId])state.attRecords[state.attSessionId]={};state.attRecords[state.attSessionId][a.student_id]={status:a.status,notes:a.notes||''};});}}else if(page==='invoices')await Promise.all([loadData('invoices','/api/invoices',b),loadData('students','/api/students',b),loadData('branches','/api/branches')]);else if(page==='session_reports'){
  await loadData('sessions','/api/sessions',b);
  const allSessions=state.data.sessions||[];
  const dates=[...new Set(allSessions.map(s=>s.date))].sort().reverse();
  if(!state.srDate&&dates.length) state.srDate=dates[0];
  if(state.srDate){
    const dateSessions=allSessions.filter(s=>s.date===state.srDate);
    await Promise.all([
      loadData('session_report_'+state.srDate,'/api/session-report/'+state.srDate),
      ...dateSessions.flatMap(s=>[
        loadData('sr_att_'+s.id,'/api/attendance/'+s.id),
        loadData('sr_prog_'+s.id,'/api/progress',{session_id:s.id})
      ])
    ]);
  }
  if(state.sessionReportId){
    await Promise.all([
      loadData('sr_att_'+state.sessionReportId,'/api/attendance/'+state.sessionReportId),
      loadData('sr_prog_'+state.sessionReportId,'/api/progress',{session_id:state.sessionReportId})
    ]);
  }
}else if(page==='lesson_reports'){
  await Promise.all([loadData('sessions','/api/sessions',b),loadData('students','/api/students',b)]);
  if(state.lrSessionId){
    await Promise.all([
      loadData('lr_'+state.lrSessionId,'/api/lesson-reports/'+state.lrSessionId),
      loadData('lr_att_'+state.lrSessionId,'/api/attendance/'+state.lrSessionId)
    ]);
  }
}
else if(page==='mgmt_reports'){
  const b2=branchParam();
  const rtype=state.mgmtTab||'summary';
  if(rtype==='summary'){
    const ys=state.mgmtYear||'';
    await loadData('mgmt_summary','/api/reports/management/summary',ys?{...b2,year_start:ys}:b2);
  } else if(rtype==='daily'){
    const rd=state.mgmtDate||new Date().toISOString().slice(0,10);
    await loadData('mgmt_daily','/api/reports/management/daily',{...b2,date:rd});
  } else if(rtype==='monthly'){
    const rm=state.mgmtMonth||new Date().toISOString().slice(0,7);
    await loadData('mgmt_monthly','/api/reports/management/monthly',{...b2,month:rm});
  } else if(rtype==='yearly'){
    const ys=state.mgmtYear||'';
    await loadData('mgmt_yearly','/api/reports/management/yearly',ys?{...b2,year_start:ys}:b2);
  }
}
else if(page==='session_plan'){
  const b2=branchParam();
  await Promise.all([
    loadData('sessions','/api/sessions',b2),
    loadData('students','/api/students',b2),
    loadData('staff','/api/staff',b2),
    loadData('branches','/api/branches'),
    loadData('all_timetables','/api/student-timetable',b2),
  ]);
  if(state.planSessionId){
    await Promise.all([
      loadData('table_allocs_'+state.planSessionId,'/api/table-allocations/'+state.planSessionId),
      loadData('plan_students_'+state.planSessionId,'/api/session-students/'+state.planSessionId),
    ]);
  }

}
else if(page==='catchup'){
  const b2=branchParam();
  await Promise.all([
    loadData('catchup_owed','/api/catchup',{...b2,status:'owed'}),
    loadData('catchup_scheduled','/api/catchup',{...b2,status:'scheduled'}),
    loadData('catchup_completed','/api/catchup',{...b2,status:'completed'}),
    loadData('sessions','/api/sessions',b2),
    loadData('students','/api/students',b2),
  ]);
}
else if(page==='test_records'){
  await Promise.all([loadData('students','/api/students',b),loadData('test_records','/api/test-records',b)]);
  if(state.trStudentId) await loadData('tr_'+state.trStudentId,'/api/test-records',{student_id:state.trStudentId});
}
else if(page==='staff_timesheets'){await Promise.all([loadData('sessions','/api/sessions',b),loadData('staff','/api/staff',b),loadData('staff_att_summary','/api/staff-attendance/summary',{...b,month:state.staffAttMonth||new Date().toISOString().slice(0,7)}),loadData('staff_att','/api/staff-attendance',{...b,month:state.staffAttMonth||new Date().toISOString().slice(0,7)})]);}else if(page==='finance'){const mp=state.finMonth?{month:state.finMonth}:{};await Promise.all([loadData('students','/api/students',b),loadData('invoices','/api/invoices',b),loadData('adjustments','/api/adjustments',b),loadData('payments','/api/payments',{...b,...mp}),loadData('instalment_plans','/api/instalment-plans',b),loadData('payment_summary','/api/payments/summary',{...b,...mp}),
    loadData('hq_transfers','/api/hq-transfers',b),
    loadData('hq_summary','/api/hq-transfers/summary')]);if(state.finStudentId)state.data['statement_'+state.finStudentId]=await API.get('/api/statement/'+state.finStudentId).catch(()=>null);}else if(page==='reports')await loadData('summary','/api/reports/summary',b);else if(page==='users')await loadData('users','/api/users');else if(page==='branches')await Promise.all([loadData('branches','/api/branches'),loadData('summary','/api/reports/summary')]);else if(page==='parent_portal'){await Promise.all([loadData('parent_users','/api/parent-users'),loadData('students','/api/students')]);}else if(page==='audit')await loadData('audit','/api/audit');}catch(e){console.error('refreshPage error:',e);}finally{state.loading=false;render();}}

function render(){const app=document.getElementById('app');if(!state.currentUser&&!state.parentUser){app.innerHTML=renderLogin();bindLoginEvents();return;}if(state.parentUser&&!state.currentUser){app.innerHTML=`<div style="max-width:900px;margin:0 auto;padding:28px;">${renderParentPortal()}</div>`;bindParentEvents();return;}if(state.loading){app.innerHTML=`<div class="app">${renderSidebar()}<div class="main">${renderTopbar()}<div class="loading"><div class="spinner"></div>Loading…<div style="font-size:12px;color:var(--text3);margin-top:8px;">If this takes more than 10 seconds, try refreshing</div></div></div></div>`;bindNav();return;}
// Guard: non-super-admin must have a branch assigned
if(state.currentUser&&state.currentUser.role!=='super_admin'&&!state.currentUser.branch_id){
  app.innerHTML=`<div class="app">${renderSidebar()}<div class="main">${renderTopbar()}<div class="content"><div class="empty-state" style="padding:60px;"><div style="font-size:48px;margin-bottom:16px;">⚠️</div><div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px;">No branch assigned</div><div style="color:var(--text3);">Your account has not been assigned to a branch. Please contact your system administrator to assign you to a branch before you can use the system.</div></div></div></div></div>`;bindNav();return;
}app.innerHTML=`<div class="app">${renderSidebar()}<div class="main">${renderTopbar()}<div class="content">${renderPage()}</div></div></div>${state.modal?renderModal():''}`;bindAll();}

<div class="login-logo-wrap"><div class="login-logo-icon">FT</div><div class="login-logo">FT Harlesden</div></div>
<div class="login-sub">Tuition Management System — sign in to continue</div>
<div class="login-field"><label>Email address</label><input type="email" id="l-email" placeholder="you@ftharlesden.co.uk"></div>
<div class="login-field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••"></div>
<button class="login-btn" id="login-btn">Sign in as staff →</button>
<button class="login-btn secondary" id="parent-login-btn">Sign in as parent</button>

</div></div>`;}

function bindLoginEvents(){document.getElementById('login-btn')?.addEventListener('click',doLogin);document.getElementById('parent-login-btn')?.addEventListener('click',doParentLogin);document.getElementById('l-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});}

async function doLogin(){const email=document.getElementById('l-email')?.value.trim();const pass=document.getElementById('l-pass')?.value;document.getElementById('login-err').textContent='';try{const user=await API.post('/api/login',{email,password:pass});if(!user)return;state.currentUser=user;state.currentBranch=user.role==='super_admin'?null:(user.branch_id||null);state.page='dashboard';refreshPage();}catch(e){document.getElementById('login-err').textContent=e.error||'Login failed';}}

async function doParentLogin(){const email=document.getElementById('l-email')?.value.trim();const pass=document.getElementById('l-pass')?.value;document.getElementById('login-err').textContent='';try{const pu=await API.post('/api/parent-login',{email,password:pass});if(!pu)return;state.parentUser=pu;const children=await API.get('/api/parent/children');state.data.parent_children=children||[];for(const child of(children||[])){state.data['p_att_'+child.id]=await API.get('/api/parent/attendance/'+child.id)||[];
        state.data['p_diary_'+child.id]=await API.get('/api/parent/diary/'+child.id)||[];
        state.data['p_tests_'+child.id]=await API.get('/api/parent/test-records/'+child.id)||[];state.data['p_inv_'+child.id]=await API.get('/api/parent/invoices/'+child.id)||[];state.data['p_prog_'+child.id]=await API.get('/api/parent/progress/'+child.id)||[];}render();}catch(e){document.getElementById('login-err').textContent=e.error||'Login failed';}}

function renderPage(){const map={dashboard:renderDashboard,students:renderStudents,staff:renderStaff,sessions:renderSessions,attendance:renderAttendance,invoices:renderInvoices,session_reports:renderSessionReports,staff_timesheets:renderStaffTimesheets,lesson_reports:renderLessonReports,test_records:renderTestRecords,catchup:renderCatchup,session_plan:renderSessionPlan,mgmt_reports:renderMgmtReports,finance:renderFinance,reports:renderReports,users:renderUsers,branches:renderBranches,parent_portal:renderParentPortalAdmin,audit:renderAudit};return(map[state.page]||renderDashboard)();}

function renderDashboard(){const s=state.data.summary||{};const bs=s.branch_stats||[];const audit=(state.data.audit||[]).slice(0,5);
return`
<div class="metrics-grid">
<div class="metric-card"><div class="metric-icon" style="background:var(--accent-bg);">${icoUsers(18)}</div><div class="metric-label">Total students</div><div class="metric-value">${s.student_count||0}</div><div class="metric-sub">Active enrolments</div></div>

function renderSessions(){
  const sessions=state.data.sessions||[];
  const sessMonth=state.sessionMonth||'';
  const sessDate=state.sessionDate||'';
  const sessSlot=state.sessionSlot||'';
  const sessTeacher=state.sessionTeacher||'';
  const sessSubject=state.sessionSubject||'';

  // ── Step 1: months ──
  const months=[...new Set(sessions.map(function(s){return s.date?s.date.slice(0,7):'';}).filter(Boolean))].sort().reverse();

  // ── Step 2: specific dates available in selected month ──
  const monthSrc=sessMonth?sessions.filter(function(s){return s.date&&s.date.slice(0,7)===sessMonth;}):sessions;
  const dateSet={};
  monthSrc.forEach(function(s){if(s.date)dateSet[s.date]=true;});
  const dates=Object.keys(dateSet).sort().reverse();

  // ── Step 3: slot times for selected month+date ──
  const dateSrc=sessDate?monthSrc.filter(function(s){return s.date===sessDate;}):monthSrc;
  const slots=[...new Set(dateSrc.map(function(s){return s.slot;}).filter(Boolean))].sort();

  // ── Step 4: teachers for selected month+date+slot ──
  const slotSrc=dateSrc.filter(function(s){return !sessSlot||s.slot===sessSlot;});
  const teacherMap={};
  slotSrc.forEach(function(s){if(s.staff_id&&s.staff_name)teacherMap[s.staff_id]=s.staff_name;});
  const teachers=Object.entries(teacherMap).map(function(e){return{id:e[0],name:e[1]};}).sort(function(a,b){return a.name.localeCompare(b.name);});

  // ── Step 5: subjects for selected month+date+slot+teacher ──
  const teacherSrc=slotSrc.filter(function(s){return !sessTeacher||String(s.staff_id)===sessTeacher;});
  const subjects=[...new Set(teacherSrc.map(function(s){return s.subject;}).filter(Boolean))].sort();

  // ── Apply all filters ──
  const filtered=sessions.filter(function(s){
    if(sessMonth&&(!s.date||s.date.slice(0,7)!==sessMonth))return false;
    if(sessDate&&s.date!==sessDate)return false;
    if(sessSlot&&s.slot!==sessSlot)return false;
    if(sessTeacher&&String(s.staff_id)!==sessTeacher)return false;
    if(sessSubject&&s.subject!==sessSubject)return false;
    return true;
  });

  // Group by date
  const byDate={};
  filtered.forEach(function(s){const d=s.date||'';if(!byDate[d])byDate[d]=[];byDate[d].push(s);});
  const groupedDates=Object.keys(byDate).sort().reverse();

  const totalPresent=filtered.reduce(function(s,x){return s+(x.present_count||0);},0);
  const totalStudents=filtered.reduce(function(s,x){return s+(x.total_count||0);},0);
  const activeFilters=[sessMonth,sessDate,sessSlot,sessTeacher,sessSubject].filter(Boolean).length;

  var html='';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">';
  html+='<div><div class="section-title">Sessions</div>';
  html+='<div class="section-sub">'+filtered.length+' session'+(filtered.length!==1?'s':'')+' shown'+(activeFilters?' · '+activeFilters+' filter'+(activeFilters>1?'s':'')+' active':'')+' · '+totalPresent+'/'+totalStudents+' attendance</div></div>';
  html+='<button class="btn btn-primary" data-action="add-session">+ Add session</button>';
  html+='</div>';

  // Filter bar
  html+='<div class="card" style="margin-bottom:16px;padding:14px 18px;">';
  html+='<div style="display:grid;grid-template-columns:repeat(5,1fr) auto;gap:10px;align-items:end;">';

  // Month
  html+='<div class="field" style="margin:0;"><label>Month</label><select id="session-month-filter">';
  html+='<option value="">All months</option>';
  months.forEach(function(m){
    html+='<option value="'+m+'" '+(m===sessMonth?'selected':'')+'>'+new Date(m+'-01T00:00:00').toLocaleDateString('en-GB',{month:'long',year:'numeric'})+'</option>';
  });
  html+='</select></div>';

  // Date — shows day + full date e.g. "Wed, 4 Jun 2026"
  html+='<div class="field" style="margin:0;"><label>Date</label><select id="session-date-filter">';
  html+='<option value="">All dates</option>';
  dates.forEach(function(d){
    var label=new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    html+='<option value="'+d+'" '+(d===sessDate?'selected':'')+'>'+label+'</option>';
  });
  html+='</select></div>';

  // Slot time
  html+='<div class="field" style="margin:0;"><label>Slot time</label><select id="session-slot-filter">';
  html+='<option value="">All slots</option>';
  slots.forEach(function(sl){html+='<option value="'+sl+'" '+(sl===sessSlot?'selected':'')+'>'+sl+'</option>';});
  html+='</select></div>';

  // Teacher
  html+='<div class="field" style="margin:0;"><label>Teacher</label><select id="session-teacher-filter">';
  html+='<option value="">All teachers</option>';
  teachers.forEach(function(t){html+='<option value="'+t.id+'" '+(String(t.id)===sessTeacher?'selected':'')+'>'+t.name+'</option>';});
  html+='</select></div>';

  // Subject
  html+='<div class="field" style="margin:0;"><label>Subject</label><select id="session-subject-filter">';
  html+='<option value="">All subjects</option>';
  subjects.forEach(function(s){html+='<option value="'+s+'" '+(s===sessSubject?'selected':'')+'>'+s+'</option>';});
  html+='</select></div>';

  // Clear
  html+='<div style="padding-bottom:1px;">';
  if(activeFilters){html+='<button class="btn btn-sm" data-action="session-clear-filters" style="white-space:nowrap;">✕ Clear</button>';}
  html+='</div>';
  html+='</div></div>';

  // Results
  if(groupedDates.length===0){
    html+='<div class="empty-state" style="padding:40px;">No sessions match these filters.</div>';
  }

  groupedDates.forEach(function(date){
    const daySessions=byDate[date];
    const dayLabel=new Date(date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const dayPresent=daySessions.reduce(function(s,x){return s+(x.present_count||0);},0);
    const dayTotal=daySessions.reduce(function(s,x){return s+(x.total_count||0);},0);
    html+='<div style="margin-bottom:14px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
    html+='<div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;">'+dayLabel+'</div>';
    html+='<div style="font-size:12px;color:var(--text3);">'+daySessions.length+' session'+(daySessions.length>1?'s':'')+' · '+dayPresent+'/'+dayTotal+' present</div>';
    html+='</div>';
    html+='<div class="card" style="padding:0;overflow:hidden;"><div class="table-wrap"><table>';
    html+='<thead><tr><th>Slot</th><th>Teacher</th><th>Subject</th><th>Table</th><th>Attendance</th><th></th></tr></thead><tbody>';
    daySessions.forEach(function(s){
      html+='<tr>';
      html+='<td style="font-size:13px;">'+s.slot+'</td>';
      html+='<td>'+(s.staff_name||'—')+'</td>';
      html+='<td><span class="badge badge-gray">'+(s.subject||'—')+'</span></td>';
      html+='<td style="color:var(--text3);font-size:13px;">T'+s.table_no+'</td>';
      html+='<td><span class="badge '+(s.present_count>0?'badge-success':'badge-gray')+'">'+s.present_count+'/'+s.total_count+' present</span></td>';
      html+='<td><div class="row-actions"><button class="btn btn-sm btn-success" data-action="mark-att" data-id="'+s.id+'">Attendance</button><button class="btn btn-sm btn-danger" data-action="del-session" data-id="'+s.id+'">Del</button></div></td>';
      html+='</tr>';
    });
    html+='</tbody></table></div></div></div>';
  });
  return html;
}

function renderAttendance(){
  const sessions=state.data.sessions||[];
  const students=state.data.students||[];
  const selId=state.attSessionId;
  const selSess=sessions.find(function(s){return s.id===selId;});
  const attData=selId?(state.data['attendance_'+selId]||[]):[];
  if(selId&&!state.attRecords[selId]){state.attRecords[selId]={};attData.forEach(function(a){state.attRecords[selId][a.student_id]={status:a.status,notes:a.notes||''};});}
  const localAtt=selId?(state.attRecords[selId]||{}):{};

  const attDateFilter=state.attDateFilter||'';
  const attSlotFilter=state.attSlotFilter||'';
  const attTeacherFilter=state.attTeacherFilter||'';
  const attStatusFilter=state.attStatusFilter||'all';

  // ── Step 1: unique dates (most recent first) ──
  const dates=[...new Set(sessions.map(function(s){return s.date;}).filter(Boolean))].sort().reverse();

  // ── Step 2: slots available on the selected date (or all) ──
  const slotSessions=attDateFilter?sessions.filter(function(s){return s.date===attDateFilter;}):sessions;
  const slots=[...new Set(slotSessions.map(function(s){return s.slot;}).filter(Boolean))].sort();

  // ── Step 3: teachers available for selected date+slot (or all) ──
  const teacherSessions=slotSessions.filter(function(s){return !attSlotFilter||s.slot===attSlotFilter;});
  const teacherMap={};
  teacherSessions.forEach(function(s){if(s.staff_id&&s.staff_name)teacherMap[s.staff_id]=s.staff_name;});
  const teachers=Object.entries(teacherMap).map(function(e){return{id:e[0],name:e[1]};}).sort(function(a,b){return a.name.localeCompare(b.name);});

  // ── Step 4: sessions shown in select (apply all 3 filters) ──
  const filteredSessions=sessions.filter(function(s){
    if(attDateFilter&&s.date!==attDateFilter)return false;
    if(attSlotFilter&&s.slot!==attSlotFilter)return false;
    if(attTeacherFilter&&String(s.staff_id)!==attTeacherFilter)return false;
    return true;
  });

  // ── Students: from table allocations if loaded, else branch fallback ──
  var sessionStudents=[];
  if(selSess){
    const sessStus=state.data['sess_students_'+selId]||[];
    if(sessStus.length){
      sessionStudents=sessStus.map(function(s){return{id:s.student_id,name:s.student_name,admission_id:s.admission_id,table_no:s.table_no,source:s.source};});
    } else {
      // Still loading or empty - show branch students as fallback
      sessionStudents=students.filter(function(s){return s.branch_id===selSess.branch_id&&s.status==='active';}).map(function(s){return{id:s.id,name:s.name,admission_id:s.admission_id};});
    }
  }

  const presentCount=Object.values(localAtt).filter(function(a){return a.status==='present';}).length;
  const absentCount=Object.values(localAtt).filter(function(a){return a.status==='absent';}).length;
  const unmarkedCount=sessionStudents.length-presentCount-absentCount;

  const visibleStudents=sessionStudents.filter(function(st){
    if(attStatusFilter==='all')return true;
    const rec=localAtt[st.id];
    if(attStatusFilter==='unmarked')return !rec;
    return rec&&rec.status===attStatusFilter;
  });

  var html='';
  html+='<div class="section-title" style="margin-bottom:4px;">Attendance</div>';
  html+='<div class="section-sub">Step 1 — pick a date. Step 2 — pick a slot. Step 3 — pick a teacher (optional). Step 4 — select session.</div>';

  html+='<div class="card" style="margin-bottom:16px;">';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 2fr;gap:12px;align-items:end;">';

  // Date filter
  html+='<div class="field" style="margin:0;"><label>Date</label><select id="att-date-filter">';
  html+='<option value="">All dates</option>';
  dates.forEach(function(d){
    var label=new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    html+='<option value="'+d+'" '+(d===attDateFilter?'selected':'')+'>'+label+'</option>';
  });
  html+='</select></div>';

  // Slot filter — options depend on selected date
  html+='<div class="field" style="margin:0;"><label>Slot</label><select id="att-slot-filter">';
  html+='<option value="">All slots</option>';
  slots.forEach(function(sl){html+='<option value="'+sl+'" '+(sl===attSlotFilter?'selected':'')+'>'+sl+'</option>';});
  html+='</select></div>';

  // Teacher filter — options depend on selected date+slot
  html+='<div class="field" style="margin:0;"><label>Teacher</label><select id="att-teacher-filter">';
  html+='<option value="">All teachers</option>';
  teachers.forEach(function(t){html+='<option value="'+t.id+'" '+(String(t.id)===attTeacherFilter?'selected':'')+'>'+t.name+'</option>';});
  html+='</select></div>';

  // Session select — narrowed by above
  var allSessionsId='all:'+filteredSessions.map(function(s){return s.id;}).join(',');
  html+='<div class="field" style="margin:0;"><label>Session <span style="font-size:11px;color:var(--text3);">('+filteredSessions.length+' shown)</span></label><select id="att-session-select">';
  html+='<option value="">— choose a session —</option>';
  if(filteredSessions.length>1){
    var allLabel=attDateFilter&&attSlotFilter?'All tables — '+new Date(attDateFilter+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})+' · '+attSlotFilter:attDateFilter?'All sessions — '+new Date(attDateFilter+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}):'All '+filteredSessions.length+' sessions';
    html+='<option value="'+allSessionsId+'" '+(state.attAllSessions===allSessionsId?'selected':'')+'>📋 '+allLabel+' ('+filteredSessions.length+' sessions)</option>';
  }
  filteredSessions.forEach(function(s){
    var dateLabel=new Date(s.date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    html+='<option value="'+s.id+'" '+(s.id===selId?'selected':'')+'>'+dateLabel+' · '+s.slot+' · T'+s.table_no+' · '+(s.staff_name||'No teacher')+'</option>';
  });
  html+='</select></div>';

  html+='</div>';

  // Hint row
  if(attDateFilter&&attSlotFilter&&!attTeacherFilter&&filteredSessions.length>1){
    html+='<div style="margin-top:10px;padding:8px 12px;background:var(--accent-bg);border-radius:var(--radius);font-size:12px;color:var(--accent);">';
    html+='<strong>'+filteredSessions.length+' sessions</strong> match this slot on '+new Date(attDateFilter+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})+' (one per table/teacher). Select a teacher above to narrow to one, or pick a session directly.';
    html+='</div>';
  }
  html+='</div>';

  // ── All sessions view ──
  if(state.attAllSessions&&!selSess){
    const allIds=state.attAllSessions.replace('all:','').split(',').map(Number);
    const allSessions=allIds.map(function(id){return sessions.find(function(s){return s.id===id;});}).filter(Boolean);
    // Build merged student list from all table allocs
    const mergedStudents=[];
    const seenIds={};
    var totalPresent=0,totalAbsent=0,totalUnmarked=0;
    allSessions.forEach(function(sess){
      const sessStusA=state.data['sess_students_'+sess.id]||[];
      const localA=state.attRecords[sess.id]||{};
      var stuList=[];
      if(sessStusA.length){
        sessStusA.forEach(function(ts){if(!seenIds[ts.student_id+'_'+sess.id]){seenIds[ts.student_id+'_'+sess.id]=true;stuList.push({id:ts.student_id,name:ts.student_name,admission_id:ts.admission_id,table_no:ts.table_no,session_id:sess.id,slot:sess.slot,teacher:sess.staff_name||'—'});}});
      }
      stuList.forEach(function(st){
        const rec=localA[st.id];
        if(rec&&rec.status==='present')totalPresent++;
        else if(rec&&rec.status==='absent')totalAbsent++;
        else totalUnmarked++;
        mergedStudents.push({...st,rec:rec});
      });
    });

    var html2='';
    if(attDateFilter){
      html2+='<div class="card" style="margin-bottom:16px;border-left:3px solid var(--accent);">';
      html2+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">';
      html2+='<div><div class="card-title">'+new Date(attDateFilter+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+(attSlotFilter?' · '+attSlotFilter:'')+'</div>';
      html2+='<div style="font-size:12px;color:var(--text3);margin-top:2px;">'+allSessions.length+' sessions · '+mergedStudents.length+' student seats total</div></div>';
      html2+='<div style="display:flex;gap:8px;flex-wrap:wrap;">';
      html2+='<span class="badge badge-success">'+totalPresent+' present</span>';
      html2+='<span class="badge badge-danger">'+totalAbsent+' absent</span>';
      html2+='<span class="badge badge-gray">'+totalUnmarked+' unmarked</span>';
      html2+='</div></div></div>';
    }

    // Show a card per session
    allSessions.forEach(function(sess){
      const sessStusB=state.data['sess_students_'+sess.id]||[];
      const localA=state.attRecords[sess.id]||{};
