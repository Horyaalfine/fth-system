<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT Harlesden — Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Core backgrounds - slightly lighter for better readability */
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--surface3:#262c36;
  --border:#30363d;--border2:#444c56;
  /* Text - higher contrast for readability */
  --text:#f0f3f9;--text2:#c9d1d9;--text3:#8b949e;
  /* Accent colours */
  --accent:#6366f1;--accent-bg:rgba(99,102,241,0.15);--accent-text:#a5b4fc;
  --success:#22c55e;--success-bg:rgba(34,197,94,0.15);--success-text:#86efac;
  --warning:#f59e0b;--warning-bg:rgba(245,158,11,0.15);
  --danger:#f87171;--danger-bg:rgba(248,113,113,0.15);--danger-text:#fca5a5;
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.15);--purple-text:#c4b5fd;
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.15);--teal-text:#5eead4;
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.15);--amber-text:#fcd34d;
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.15);--blue-text:#93c5fd;
  --pink:#f472b6;--pink-bg:rgba(244,114,182,0.15);
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
  /* Inter font - highly readable at all sizes */
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 4px 24px rgba(0,0,0,0.4);--shadow-lg:0 8px 40px rgba(0,0,0,0.5);
  --glow:0 0 20px rgba(99,102,241,0.2);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:100vh;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(108,99,255,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(20,184,166,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{display:flex;min-height:100vh;position:relative;z-index:1;}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:rgba(26,29,39,0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.content{padding:28px;}

/* SIDEBAR */
.sidebar-brand{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;margin-bottom:10px;box-shadow:0 4px 12px rgba(108,99,255,0.3);}
.brand-name{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.2px;}
.brand-sub{font-size:11px;color:var(--text3);margin-top:1px;letter-spacing:0.5px;text-transform:uppercase;}
.branch-switcher{margin:12px 14px 0;background:var(--accent-bg);border-radius:var(--radius);border:1px solid rgba(108,99,255,0.2);padding:10px 12px;}
.branch-switcher label{font-size:10px;color:var(--accent-text);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:5px;}
.branch-switcher select{width:100%;background:transparent;border:none;font-family:var(--font);font-size:13px;font-weight:500;color:var(--accent-text);cursor:pointer;outline:none;}
.branch-switcher select option{background:var(--surface2);color:var(--text);}
.nav-section{padding:12px 10px 0;flex:1;}
.nav-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:0 10px;margin:12px 0 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:14px;font-weight:400;transition:all 0.15s;margin-bottom:2px;border:1px solid transparent;}
.nav-item:hover{background:var(--surface2);color:var(--text);border-color:var(--border);}
.nav-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:500;border-color:rgba(108,99,255,0.2);}
.nav-item svg{flex-shrink:0;opacity:0.7;}
.nav-item.active svg{opacity:1;}
.sidebar-footer{padding:14px 12px;border-top:1px solid var(--border);}
.user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);background:var(--surface2);border:1px solid var(--border);}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.av-purple{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;}
.av-blue{background:linear-gradient(135deg,var(--blue),var(--accent));color:#fff;}
.av-teal{background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;}
.av-amber{background:linear-gradient(135deg,var(--amber),var(--pink));color:#fff;}

/* TOPBAR */
.page-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.3px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.02em;}
.badge-purple{background:var(--purple-bg);color:var(--purple-text);border:1px solid rgba(168,85,247,0.2);}
.badge-blue{background:var(--blue-bg);color:var(--blue-text);border:1px solid rgba(59,130,246,0.2);}
.badge-teal{background:var(--teal-bg);color:var(--teal-text);border:1px solid rgba(20,184,166,0.2);}
.badge-amber{background:var(--amber-bg);color:var(--amber-text);border:1px solid rgba(245,158,11,0.2);}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.badge-success{background:var(--success-bg);color:var(--success-text);border:1px solid rgba(34,197,94,0.2);}
.badge-danger{background:var(--danger-bg);color:var(--danger-text);border:1px solid rgba(239,68,68,0.2);}
.badge-accent{background:var(--accent-bg);color:var(--accent-text);border:1px solid rgba(108,99,255,0.2);}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;overflow:hidden;transition:border-color 0.2s;}
.metric-card:hover{border-color:var(--border2);}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.metric-card:nth-child(1)::before{background:linear-gradient(90deg,var(--accent),var(--purple));}
.metric-card:nth-child(2)::before{background:linear-gradient(90deg,var(--teal),var(--blue));}
.metric-card:nth-child(3)::before{background:linear-gradient(90deg,var(--amber),var(--pink));}
.metric-card:nth-child(4)::before{background:linear-gradient(90deg,var(--success),var(--teal));}
.metric-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.metric-label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px;}
.metric-value{font-size:30px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-0.5px;}
.metric-sub{font-size:11px;color:var(--text3);margin-top:6px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:600;color:var(--text);}
.two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:24px;}

/* TABLES */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;font-weight:700;color:var(--text2);padding:11px 14px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;background:var(--surface2);}
th:first-child{border-radius:8px 0 0 0;}
th:last-child{border-radius:0 8px 0 0;}
td{padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text);font-size:14px;}
td strong{color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.id-code{font-family:var(--mono);font-size:11px;background:var(--surface3);padding:3px 8px;border-radius:6px;color:var(--accent-text);border:1px solid rgba(108,99,255,0.15);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn:hover{background:var(--surface3);border-color:var(--border2);color:var(--text);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;box-shadow:0 4px 12px rgba(108,99,255,0.3);}
.btn-primary:hover{opacity:0.9;box-shadow:0 6px 16px rgba(108,99,255,0.4);transform:translateY(-1px);}
.btn-success{background:var(--success-bg);color:var(--success-text);border-color:rgba(34,197,94,0.2);}
.btn-danger{background:var(--danger-bg);color:var(--danger-text);border-color:rgba(239,68,68,0.2);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:13px;font-weight:600;color:var(--text);letter-spacing:0.01em;margin-bottom:4px;}
.field input,.field select,.field textarea{border:1.5px solid #555e68;border-radius:var(--radius);padding:11px 14px;font-family:var(--font);font-size:14px;background:#1c2533;color:#f0f3f9;outline:none;transition:all 0.15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.15);background:var(--surface3);}
.field input::placeholder{color:var(--text3);}
.field select option{background:var(--surface2);}
.field .hint{font-size:11px;color:var(--text3);}

/* MODALS */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-lg{max-width:720px;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:17px;font-weight:700;color:var(--text);}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--surface2);border-radius:0 0 var(--radius-xl) var(--radius-xl);}

/* TOAST */
.toast-container{position:fixed;bottom:28px;right:28px;z-index:200;display:flex;flex-direction:column;gap:10px;}
.toast{padding:14px 18px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;animation:slideIn 0.25s ease;display:flex;align-items:center;gap:10px;min-width:260px;box-shadow:var(--shadow);border:1px solid;}
.toast-success{background:var(--surface);color:var(--success-text);border-color:rgba(34,197,94,0.3);}
.toast-error{background:var(--surface);color:var(--danger-text);border-color:rgba(239,68,68,0.3);}
@keyframes slideIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}

/* MISC */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:220px;}
.search-wrap input{width:100%;padding-left:36px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.section-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-0.3px;}
.section-sub{font-size:13px;color:var(--text3);margin-bottom:22px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;}
.dot-green{background:var(--success);}
.dot-red{background:var(--danger);}
.dot-amber{background:var(--amber);}
.empty-state{text-align:center;padding:56px 24px;color:var(--text3);}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0;}
.row-actions{display:flex;gap:6px;}
.bar-row{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:13px;border-bottom:1px solid var(--border);}
.bar-row:last-child{border-bottom:none;}
.bar-bg{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
.notice-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.notice-item:last-child{border-bottom:none;}
.notice-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.att-cell{border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all 0.15s;background:var(--surface2);}
.att-cell.present{background:var(--success-bg);border-color:rgba(34,197,94,0.3);}
.att-cell.absent{background:var(--danger-bg);border-color:rgba(239,68,68,0.3);}
.att-cell:hover{border-color:var(--accent);transform:translateY(-1px);}
.att-name{font-size:12px;font-weight:600;color:var(--text);}
.att-id{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.att-status{font-size:10px;margin-top:5px;font-weight:600;letter-spacing:0.05em;}
.sibling-badge{font-size:10px;background:var(--teal-bg);color:var(--teal-text);padding:2px 7px;border-radius:8px;font-weight:600;border:1px solid rgba(20,184,166,0.2);}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:11px 20px;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent-text);border-bottom-color:var(--accent);}
.stat-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text2);}
.highlight-card{background:linear-gradient(135deg,var(--accent-bg),var(--purple-bg));border:1px solid rgba(108,99,255,0.2);border-radius:var(--radius-lg);padding:20px 24px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;}
.login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(108,99,255,0.08) 0%,transparent 70%);}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:40px;width:100%;max-width:400px;position:relative;box-shadow:var(--shadow-lg);}
.login-logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.login-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;box-shadow:0 6px 16px rgba(108,99,255,0.35);}
.login-logo{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:32px;margin-top:2px;}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:0.02em;}
.login-field input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--surface2);outline:none;transition:all 0.15s;}
.login-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.15);}
.login-field input::placeholder{color:var(--text3);}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:all 0.15s;box-shadow:0 4px 12px rgba(108,99,255,0.3);}
.login-btn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 6px 16px rgba(108,99,255,0.4);}
.login-btn.secondary{background:var(--surface2);color:var(--teal-text);border:1px solid rgba(20,184,166,0.2);box-shadow:none;margin-top:10px;}
.login-btn.secondary:hover{background:var(--teal-bg);box-shadow:none;}
.login-error{color:var(--danger-text);font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
.login-hint{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.8;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:80px;color:var(--text3);font-size:13px;}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ASSESSMENT / LEARNING PLAN SPECIFIC */
.level-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
.level-1{background:var(--success-bg);color:var(--success-text);}
.level-2{background:var(--blue-bg);color:var(--blue-text);}
.level-3{background:var(--amber-bg);color:var(--amber-text);}
.level-4{background:var(--danger-bg);color:var(--danger-text);}
.plan-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.fee-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.fee-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.fee-item-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
.fee-item-value{font-size:20px;font-weight:700;color:var(--text);margin-top:4px;}

@media(max-width:1024px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.two-col{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}

/* ── MOBILE ── */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text);flex-shrink:0;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99;}
@media(max-width:768px){
.hamburger{display:flex;}
.sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);transition:transform 0.25s ease;width:260px;}
.sidebar.open{transform:translateX(0);}
.sidebar-overlay.open{display:block;}
.main{margin-left:0 !important;}
.topbar{padding:10px 12px;}
.content{padding:12px 10px;}
.metrics-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
.metric-value{font-size:20px;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{min-width:480px;}
.card-header{flex-direction:column;align-items:flex-start;gap:8px;}
.form-grid{grid-template-columns:1fr !important;}
.modal-card{width:calc(100vw - 20px);max-width:100%;margin:10px;max-height:92vh;}
.modal-footer{flex-wrap:wrap;gap:8px;}
.modal-footer .btn{flex:1;min-width:100px;justify-content:center;}
.section-header{flex-direction:column;align-items:flex-start;gap:10px;}
.tab-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;}
.tab{white-space:nowrap;font-size:13px;}
.login-card{margin:20px 14px;padding:22px 18px;}
.row-actions{flex-direction:column;gap:3px;}
}
</style>
</head>
<body>
<div id="app"></div><div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="toast-container" id="toasts"></div>
<script>
const API={async call(method,path,body){const opts={method,credentials:'include',headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),8000);opts.signal=controller.signal;try{const res=await fetch(path,opts);clearTimeout(timer);if(res.status===401){state.currentUser=null;state.parentUser=null;render();return null;}return res.ok?res.json():Promise.reject(await res.json());}catch(e){clearTimeout(timer);if(e.name==='AbortError')console.warn('Timeout:',path);throw e;}},get:(p,q)=>API.call('GET',q?p+'?'+new URLSearchParams(q):p),post:(p,body)=>API.call('POST',p,body),put:(p,body)=>API.call('PUT',p,body),delete:(p)=>API.call('DELETE',p)};

let state={currentUser:null,parentUser:null,currentBranch:null,page:'dashboard',modal:null,editTarget:null,data:{},loading:false,attRecords:{},attSessionId:null,sessionReportId:null,invoiceFilter:'all',studentSearch:'',regTab:'students',staffAttMonth:new Date().toISOString().slice(0,7),staffAttTab:'summary',lrSessionId:null,lrTab:'report',srTab:'daily',srDate:'',srMonth:'',catchupTab:'owed',planSessionId:null,planMonth:'',planTab:'allocate',timetableStudentId:null,mgmtTab:'summary',mgmtDate:new Date().toISOString().slice(0,10),mgmtMonth:new Date().toISOString().slice(0,7),mgmtYear:'',trStudentId:null,trTab:'records',finStudentId:null,finTab:'statement',finMethod:null,finMonth:''};

function toast(msg,type='success'){const el=document.createElement('div');el.className=`toast toast-${type}`;el.innerHTML=(type==='success'?'<span style="color:var(--success)">✓</span> ':'<span style="color:var(--danger)">✕</span> ')+msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3500);}
function roleBadge(role){const m={super_admin:['badge-purple','Super admin'],branch_manager:['badge-blue','Branch manager'],teacher:['badge-teal','Teacher'],receptionist:['badge-amber','Receptionist']};const[cls,label]=m[role]||['badge-gray',role];return`<span class="badge ${cls}">${label}</span>`;}
function statusDot(s){return s==='active'?`<span class="dot dot-green"></span><span style="color:var(--success-text)">Active</span>`:`<span class="dot dot-red"></span><span style="color:var(--danger-text)">Inactive</span>`;}
function avatarInitials(name){return(name||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function avatarClass(role){return{super_admin:'av-purple',branch_manager:'av-blue',head_of_centre:'av-blue',supervisor:'av-teal',teacher:'av-teal',receptionist:'av-amber',admin:'av-gray'}[role]||'av-blue';}
function branchParam(){
  if(state.currentBranch) return {branch_id:state.currentBranch};
  // Non-super-admin always scoped to their branch
  const role=state.currentUser?.role;
  if(role&&role!=='super_admin'&&state.currentUser?.branch_id){
    return {branch_id:state.currentUser.branch_id};
  }
  return {};
}
function canAccess(page){
  const r=state.currentUser?.role;
  if(r==='super_admin') return true;
  if(r==='branch_manager') return['dashboard','students','staff','sessions','attendance','invoices','session_reports','lesson_reports','test_records','staff_timesheets','finance','reports','catchup','session_plan','mgmt_reports'].includes(page);
  if(r==='head_of_centre') return['dashboard','students','staff','sessions','attendance','invoices','session_reports','lesson_reports','test_records','staff_timesheets','finance','reports','catchup','session_plan','mgmt_reports'].includes(page);
  if(r==='supervisor') return['dashboard','students','sessions','attendance','session_reports','lesson_reports','test_records','staff_timesheets','catchup','session_plan'].includes(page);
  if(r==='teacher') return['dashboard','sessions','attendance','session_reports','lesson_reports','test_records','staff_timesheets'].includes(page);
  if(r==='receptionist') return['dashboard','students','sessions','attendance','invoices','finance'].includes(page);
  if(r==='admin') return['dashboard','students','sessions','attendance','invoices'].includes(page);
  return false;
}
function invBadge(s){if(s==='paid')return`<span class="badge badge-success">Paid</span>`;if(s==='overdue')return`<span class="badge badge-danger">Overdue</span>`;return`<span class="badge badge-amber">Due</span>`;}
function stars(n){return Array.from({length:5},(_,i)=>`<span style="color:${i<n?'var(--amber)':'var(--surface3)'}">★</span>`).join('');}
async function loadData(key,path,params){try{state.data[key]=await API.get(path,params||{});}catch(e){state.data[key]=state.data[key]||[];}}
async function refreshPage(){state.loading=true;render();const b=branchParam();const page=state.page;try{if(page==='dashboard'){const loads=[loadData('branches','/api/branches'),loadData('summary','/api/reports/summary',b)];if(state.currentUser?.role==='super_admin')loads.push(loadData('audit','/api/audit'));await Promise.all(loads);}else if(page==='students')await loadData('students','/api/students',{...b,q:state.studentSearch});else if(page==='staff')await loadData('staff','/api/staff',b);else if(page==='sessions')await loadData('sessions','/api/sessions',b);else if(page==='attendance'){await Promise.all([loadData('sessions','/api/sessions',b),loadData('students','/api/students',b)]);if(state.attSessionId)await loadData('attendance_'+state.attSessionId,'/api/attendance/'+state.attSessionId);}else if(page==='invoices')await loadData('invoices','/api/invoices',{...b,status:state.invoiceFilter});else if(page==='session_reports'){
  await loadData('sessions','/api/sessions',b);
  const allSessions=state.data.sessions||[];
  const dates=[...new Set(allSessions.map(s=>s.date))].sort().reverse();
  if(!state.srDate&&dates.length) state.srDate=dates[0];
  if(state.srDate){
    const dateSessions=allSessions.filter(s=>s.date===state.srDate);
    await Promise.all([
      loadData('session_report_'+state.srDate,'/api/session-report/'+state.srDate),
      ...dateSessions.flatMap(s=>[
        loadData('sr_att_'+s.id,'/api/attendance/'+s.id),
        loadData('sr_prog_'+s.id,'/api/progress',{session_id:s.id})
      ])
    ]);
  }
  if(state.sessionReportId){
    await Promise.all([
      loadData('sr_att_'+state.sessionReportId,'/api/attendance/'+state.sessionReportId),
      loadData('sr_prog_'+state.sessionReportId,'/api/progress',{session_id:state.sessionReportId})
    ]);
  }
}else if(page==='lesson_reports'){
  await Promise.all([loadData('sessions','/api/sessions',b),loadData('students','/api/students',b)]);
  if(state.lrSessionId){
    await Promise.all([
      loadData('lr_'+state.lrSessionId,'/api/lesson-reports/'+state.lrSessionId),
      loadData('lr_att_'+state.lrSessionId,'/api/attendance/'+state.lrSessionId)
    ]);
  }
}
else if(page==='mgmt_reports'){
  const b2=branchParam();
  const rtype=state.mgmtTab||'summary';
  if(rtype==='summary'){
    const ys=state.mgmtYear||'';
    await loadData('mgmt_summary','/api/reports/management/summary',ys?{...b2,year_start:ys}:b2);
  } else if(rtype==='daily'){
    const rd=state.mgmtDate||new Date().toISOString().slice(0,10);
    await loadData('mgmt_daily','/api/reports/management/daily',{...b2,date:rd});
  } else if(rtype==='monthly'){
    const rm=state.mgmtMonth||new Date().toISOString().slice(0,7);
    await loadData('mgmt_monthly','/api/reports/management/monthly',{...b2,month:rm});
  } else if(rtype==='yearly'){
    const ys=state.mgmtYear||'';
    await loadData('mgmt_yearly','/api/reports/management/yearly',ys?{...b2,year_start:ys}:b2);
  }
}
else if(page==='session_plan'){
  const b2=branchParam();
  await Promise.all([
    loadData('sessions','/api/sessions',b2),
    loadData('students','/api/students',b2),
    loadData('staff','/api/staff',b2),
    loadData('branches','/api/branches'),
  ]);
  if(state.planSessionId){
    await Promise.all([
      loadData('table_allocs_'+state.planSessionId,'/api/table-allocations/'+state.planSessionId),
      loadData('plan_students_'+state.planSessionId,'/api/session-students/'+state.planSessionId),
    ]);
  }

}
else if(page==='catchup'){
  const b2=branchParam();
  await Promise.all([
    loadData('catchup_owed','/api/catchup',{...b2,status:'owed'}),
    loadData('catchup_scheduled','/api/catchup',{...b2,status:'scheduled'}),
    loadData('catchup_completed','/api/catchup',{...b2,status:'completed'}),
    loadData('sessions','/api/sessions',b2),
    loadData('students','/api/students',b2),
  ]);
}
else if(page==='test_records'){
  await Promise.all([loadData('students','/api/students',b),loadData('test_records','/api/test-records',b)]);
  if(state.trStudentId) await loadData('tr_'+state.trStudentId,'/api/test-records',{student_id:state.trStudentId});
}
else if(page==='staff_timesheets'){await Promise.all([loadData('sessions','/api/sessions',b),loadData('staff','/api/staff',b),loadData('staff_att_summary','/api/staff-attendance/summary',{...b,month:state.staffAttMonth||new Date().toISOString().slice(0,7)}),loadData('staff_att','/api/staff-attendance',{...b,month:state.staffAttMonth||new Date().toISOString().slice(0,7)})]);}else if(page==='finance'){const mp=state.finMonth?{month:state.finMonth}:{};await Promise.all([loadData('students','/api/students',b),loadData('payments','/api/payments',{...b,...mp}),loadData('instalment_plans','/api/instalment-plans',b),loadData('payment_summary','/api/payments/summary',{...b,...mp}),
    loadData('hq_transfers','/api/hq-transfers',b),
    loadData('hq_summary','/api/hq-transfers/summary')]);if(state.finStudentId)state.data['statement_'+state.finStudentId]=await API.get('/api/statement/'+state.finStudentId).catch(()=>null);}else if(page==='reports')await loadData('summary','/api/reports/summary',b);else if(page==='users')await loadData('users','/api/users');else if(page==='branches')await Promise.all([loadData('branches','/api/branches'),loadData('summary','/api/reports/summary')]);else if(page==='parent_portal'){await Promise.all([loadData('parent_users','/api/parent-users'),loadData('students','/api/students')]);}else if(page==='audit')await loadData('audit','/api/audit');}catch(e){console.error('refreshPage error:',e);}finally{state.loading=false;render();}}

function render(){const app=document.getElementById('app');if(!state.currentUser&&!state.parentUser){app.innerHTML=renderLogin();bindLoginEvents();return;}if(state.parentUser&&!state.currentUser){app.innerHTML=`<div style="max-width:900px;margin:0 auto;padding:28px;">${renderParentPortal()}</div>`;bindParentEvents();return;}if(state.loading){app.innerHTML=`<div class="app">${renderSidebar()}<div class="main">${renderTopbar()}<div class="loading"><div class="spinner"></div>Loading…<div style="font-size:12px;color:var(--text3);margin-top:8px;">If this takes more than 10 seconds, try refreshing</div></div></div></div>`;bindNav();return;}
// Guard: non-super-admin must have a branch assigned
if(state.currentUser&&state.currentUser.role!=='super_admin'&&!state.currentUser.branch_id){
  app.innerHTML=`<div class="app">${renderSidebar()}<div class="main">${renderTopbar()}<div class="content"><div class="empty-state" style="padding:60px;"><div style="font-size:48px;margin-bottom:16px;">⚠️</div><div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px;">No branch assigned</div><div style="color:var(--text3);">Your account has not been assigned to a branch. Please contact your system administrator to assign you to a branch before you can use the system.</div></div></div></div></div>`;bindNav();return;
}app.innerHTML=`<div class="app">${renderSidebar()}<div class="main">${renderTopbar()}<div class="content">${renderPage()}</div></div></div>${state.modal?renderModal():''}`;bindAll();}

function renderLogin(){return`<div class="login-wrap"><div class="login-card">
<div class="login-logo-wrap"><div class="login-logo-icon">FT</div><div class="login-logo">FT Harlesden</div></div>
<div class="login-sub">Tuition Management System — sign in to continue</div>
<div class="login-field"><label>Email address</label><input type="email" id="l-email" placeholder="you@ftharlesden.co.uk"></div>
<div class="login-field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••"></div>
<button class="login-btn" id="login-btn">Sign in as staff →</button>
<button class="login-btn secondary" id="parent-login-btn">Sign in as parent</button>
<div class="login-error" id="login-err"></div>

</div></div>`;}

function bindLoginEvents(){document.getElementById('login-btn')?.addEventListener('click',doLogin);document.getElementById('parent-login-btn')?.addEventListener('click',doParentLogin);document.getElementById('l-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});}

async function doLogin(){const email=document.getElementById('l-email')?.value.trim();const pass=document.getElementById('l-pass')?.value;document.getElementById('login-err').textContent='';try{const user=await API.post('/api/login',{email,password:pass});if(!user)return;state.currentUser=user;state.currentBranch=user.role==='super_admin'?null:(user.branch_id||null);state.page='dashboard';refreshPage();}catch(e){document.getElementById('login-err').textContent=e.error||'Login failed';}}

async function doParentLogin(){const email=document.getElementById('l-email')?.value.trim();const pass=document.getElementById('l-pass')?.value;document.getElementById('login-err').textContent='';try{const pu=await API.post('/api/parent-login',{email,password:pass});if(!pu)return;state.parentUser=pu;const children=await API.get('/api/parent/children');state.data.parent_children=children||[];for(const child of(children||[])){state.data['p_att_'+child.id]=await API.get('/api/parent/attendance/'+child.id)||[];
        state.data['p_diary_'+child.id]=await API.get('/api/parent/diary/'+child.id)||[];
        state.data['p_tests_'+child.id]=await API.get('/api/parent/test-records/'+child.id)||[];state.data['p_inv_'+child.id]=await API.get('/api/parent/invoices/'+child.id)||[];state.data['p_prog_'+child.id]=await API.get('/api/parent/progress/'+child.id)||[];}render();}catch(e){document.getElementById('login-err').textContent=e.error||'Login failed';}}

function renderSidebar(){const u=state.currentUser;const isSA=u.role==='super_admin';const pages=[{id:'dashboard',icon:icoHome(),label:'Dashboard'},{id:'students',icon:icoUsers(),label:'Students'},{id:'staff',icon:icoUser(),label:'Staff'},{id:'sessions',icon:icoCal(),label:'Sessions'},{id:'session_plan',icon:icoGrid(),label:'Session planner'},{id:'attendance',icon:icoCheck(),label:'Attendance'},{id:'invoices',icon:icoPound(),label:'Invoices & fees'},{id:'session_reports',icon:icoDoc(),label:'Session reports'},{id:'catchup',icon:icoHeart(),label:'Catch-up lessons'},{id:'lesson_reports',icon:icoBook(),label:'Lesson reports'},{id:'test_records',icon:icoTest(),label:'Test records'},{id:'staff_timesheets',icon:icoClipboard(),label:'Staff timesheets'},{id:'finance',icon:icoFinance(),label:'Finance'},{id:'reports',icon:icoChart(),label:'Analytics'},{id:'mgmt_reports',icon:icoClipboard(),label:'Management reports'}];const adminPages=[{id:'users',icon:icoKey(),label:'User management'},{id:'branches',icon:icoBranch(),label:'Branches'},{id:'parent_portal',icon:icoHeart(),label:'Parent portal'},{id:'audit',icon:icoLog(),label:'Audit log'}];const branches=state.data.branches||[];
return`<div class="sidebar">
<div class="sidebar-brand"><div class="brand-icon">FT</div><div class="brand-name">FT Harlesden</div><div class="brand-sub">Management System</div></div>
${isSA?`<div style="padding:10px 14px 0;"><div class="branch-switcher"><label>Viewing branch</label><select id="branch-switch"><option value="">All branches</option>${branches.map(b=>`<option value="${b.id}" ${state.currentBranch==b.id?'selected':''}>${b.name}</option>`).join('')}</select></div></div>`:''}
<div class="nav-section">
<div class="nav-label">Main</div>
${pages.filter(p=>canAccess(p.id)).map(p=>`<div class="nav-item ${state.page===p.id?'active':''}" data-page="${p.id}">${p.icon} ${p.label}</div>`).join('')}
${(u.role==='super_admin'||u.role==='branch_manager'||u.role==='head_of_centre')?`<div class="nav-label" style="margin-top:14px;">Admin</div>${adminPages.filter(p=>canAccess(p.id)).map(p=>`<div class="nav-item ${state.page===p.id?'active':''}" data-page="${p.id}">${p.icon} ${p.label}</div>`).join('')}`:''}
</div>
<div class="sidebar-footer">
<div class="user-chip"><div class="avatar ${avatarClass(u.role)}">${avatarInitials(u.name)}</div><div><div style="font-size:13px;font-weight:600;color:var(--text);">${u.name}</div><div style="margin-top:2px;">${roleBadge(u.role)}</div></div></div>
<div class="nav-item" data-action="change-password" style="font-size:12px;color:var(--text3);padding:6px 4px;margin-top:4px;cursor:pointer;">🔑 Change password</div><button class="btn btn-sm" id="logout-btn" style="width:100%;margin-top:6px;justify-content:center;">Sign out</button>
</div></div>`;}

function renderTopbar(){const titles={dashboard:'Dashboard',students:'Students',staff:'Staff',sessions:'Sessions',attendance:'Attendance',invoices:'Invoices & fees',session_reports:'Session reports',staff_timesheets:'Staff timesheets',lesson_reports:'Lesson reports',test_records:'Test records',catchup:'Catch-up lessons',session_plan:'Session planner',mgmt_reports:'Management reports',finance:'Finance',reports:'Analytics',users:'User management',branches:'Branches',parent_portal:'Parent portal',audit:'Audit log'};const b=state.currentBranch?(state.data.branches||[]).find(br=>br.id===state.currentBranch):null;
return`<div class="topbar"><button class="hamburger" id="hamburger-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><div class="page-title">${titles[state.page]||''}</div><div class="topbar-right">${b?`<span class="badge badge-accent">${b.name}</span>`:`<span class="badge badge-purple">${state.currentUser.role==='super_admin'?'All branches':''}</span>`}<div class="user-chip" style="padding:6px 10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);"><div class="avatar ${avatarClass(state.currentUser.role)}" style="width:26px;height:26px;font-size:10px;">${avatarInitials(state.currentUser.name)}</div><span style="font-size:13px;color:var(--text2);margin-left:6px;">${state.currentUser.name}</span></div></div></div>`;}

function renderPage(){const map={dashboard:renderDashboard,students:renderStudents,staff:renderStaff,sessions:renderSessions,attendance:renderAttendance,invoices:renderInvoices,session_reports:renderSessionReports,staff_timesheets:renderStaffTimesheets,lesson_reports:renderLessonReports,test_records:renderTestRecords,catchup:renderCatchup,session_plan:renderSessionPlan,mgmt_reports:renderMgmtReports,finance:renderFinance,reports:renderReports,users:renderUsers,branches:renderBranches,parent_portal:renderParentPortalAdmin,audit:renderAudit};return(map[state.page]||renderDashboard)();}

function renderDashboard(){const s=state.data.summary||{};const bs=s.branch_stats||[];const audit=(state.data.audit||[]).slice(0,5);
return`
<div class="metrics-grid">
<div class="metric-card"><div class="metric-icon" style="background:var(--accent-bg);">${icoUsers(18)}</div><div class="metric-label">Total students</div><div class="metric-value">${s.student_count||0}</div><div class="metric-sub">Active enrolments</div></div>
<div class="metric-card"><div class="metric-icon" style="background:var(--teal-bg);">${icoUser(18)}</div><div class="metric-label">Staff active</div><div class="metric-value">${s.staff_count||0}</div><div class="metric-sub">Teachers &amp; support</div></div>
<div class="metric-card"><div class="metric-icon" style="background:var(--amber-bg);">${icoCal(18)}</div><div class="metric-label">Sessions recorded</div><div class="metric-value">${s.session_count||0}</div><div class="metric-sub">All time</div></div>
<div class="metric-card"><div class="metric-icon" style="background:var(--success-bg);">${icoCheck(18)}</div><div class="metric-label">Attendance rate</div><div class="metric-value">${s.att_rate||0}%</div><div class="metric-sub">${s.att_present||0}/${s.att_total||0} sessions</div></div>
</div>
<div class="two-col">
<div class="card">
<div class="card-header"><div class="card-title">Branch utilisation</div></div>
${bs.map((b,i)=>{const pct=b.att_total?Math.round(b.present/b.att_total*100):0;const cols=['var(--accent)','var(--teal)','var(--amber)','var(--pink)'];return`<div class="bar-row"><span style="min-width:90px;color:var(--text2);font-weight:500;">${b.name}</span><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cols[i%cols.length]};"></div></div><span style="min-width:40px;text-align:right;font-weight:700;color:var(--text);">${pct}%</span><span style="font-size:11px;color:var(--text3);min-width:70px;text-align:right;">${b.students} students</span></div>`;}).join('')}
<hr class="divider">
<div class="card-title" style="margin-bottom:12px;">Recent activity</div>
${audit.map(l=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border);"><span style="color:var(--text2);">${l.user_name} <span style="color:var(--text3);">—</span> <span class="badge ${l.action.startsWith('add')?'badge-success':l.action.startsWith('del')?'badge-danger':'badge-gray'}" style="font-size:10px;">${l.action}</span> in <em style="color:var(--accent-text);">${l.table_name}</em></span><span style="color:var(--text3);white-space:nowrap;">${new Date(l.timestamp).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span></div>`).join('')||'<p style="color:var(--text3);font-size:13px;padding:10px 0;">No recent activity</p>'}
</div>
<div>
<div class="highlight-card" style="margin-bottom:16px;">
<div style="font-size:13px;font-weight:600;color:var(--accent-text);margin-bottom:6px;">Outstanding fees</div>
<div style="font-size:32px;font-weight:700;color:var(--text);">£${(s.outstanding_fees||0).toLocaleString()}</div>
<div style="font-size:12px;color:var(--text3);margin-top:4px;">Across all branches</div>
</div>
<div class="card">
<div class="card-title" style="margin-bottom:12px;">Quick actions</div>
<div style="display:flex;flex-direction:column;gap:8px;">
<button class="btn btn-primary" data-nav="students" data-action="add-student">+ Enrol new student</button>
<button class="btn" data-nav="sessions" data-action="add-session">+ Add session</button>
<button class="btn" data-nav="attendance">Mark attendance</button>
<button class="btn" data-nav="invoices" data-action="gen-invoices">Generate invoices</button>
</div>
</div>
</div>
</div>`;}

function renderStudents(){const students=state.data.students||[];
return`
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
<div><div class="section-title">Students</div><div class="section-sub">${students.length} enrolled${state.currentBranch?' · '+(state.data.branches||[]).find(b=>b.id===state.currentBranch)?.name||'':' across all branches'}</div></div>
<button class="btn btn-primary" data-action="add-student">+ Enrol student</button>

function renderSessionReports(){
  const sessions=state.data.sessions||[];
  const srTab=state.srTab||'daily';
  const selId=state.sessionReportId;

  const dates=[...new Set(sessions.map(function(s){return s.date;}).filter(Boolean))].sort().reverse();
  const selDate=state.srDate||dates[0]||'';
  const report=state.data['session_report_'+selDate]||{slots:[]};

  function attBadge(status){
    if(status==='present') return '<span style="display:inline-block;width:16px;height:16px;background:var(--success);border-radius:50%;vertical-align:middle;"></span>';
    if(status==='absent')  return '<span style="display:inline-block;width:16px;height:16px;background:var(--danger);border-radius:50%;vertical-align:middle;"></span>';
    return '<span style="display:inline-block;width:16px;height:16px;background:var(--border2);border-radius:50%;vertical-align:middle;"></span>';
  }

  function exportDailyReport(){
    const rows=[['FT Harlesden — Session Report | '+selDate],[]];
    (report.slots||[]).forEach(function(slot){
      rows.push(['SLOT: '+slot.slot]);
      rows.push(['Table','Teacher','Subject','#','Student ID','Student Name','Attendance','Notes']);
      (slot.tables||[]).forEach(function(t){
        (t.students||[]).forEach(function(s,i){
          rows.push([
            i===0?'Table '+t.table_no:'',
            i===0?(t.teacher_name||'—'):'',
            i===0?(t.subject||'—'):'',
            i+1,
            s.admission_id||'—',
            s.student_name||'—',
            s.att_status||'—',
            s.att_notes||''
          ]);
        });
        rows.push(['','','','Total:',t.students?t.students.length:0]);
        rows.push([]);
      });
      rows.push(['SLOT TOTAL: '+slot.slot,'','','',slot.total_students||0]);
      rows.push([]);
    });
    const csv=rows.map(function(r){return r.map(function(c){return typeof c==='string'&&c.includes(',')?'"'+c+'"':c;}).join(',');}).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='fth-session-report-'+selDate+'.csv';
    a.click();
  }
  window._exportDailyReport=exportDailyReport;

  var html='';
  html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">';
  html+='<div><div class="section-title" style="margin-bottom:2px;">Session reports</div>';

  html+='</div>';

  html+='<div class="tab-bar" style="margin-bottom:16px;">';
  html+='<div class="tab '+(srTab==='daily'?'active':'')+'" data-action="sr-tab" data-tab="daily">Daily report (all slots)</div>';
  html+='<div class="tab '+(srTab==='single'?'active':'')+'" data-action="sr-tab" data-tab="single">Single session</div>';
  html+='</div>';

  // ── DAILY REPORT ──
  if(srTab==='daily'){
    // Date selector + export
    html+='<div style="display:flex;gap:10px;align-items:flex-end;margin-bottom:16px;">';
    html+='<div class="field" style="margin:0;"><label>Select date</label>';
    html+='<select id="sr-date-select" style="border:1px solid var(--border2);border-radius:var(--radius);padding:7px 10px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;">';
    html+='<option value="">— choose date —</option>';
    dates.forEach(function(d){
      html+='<option value="'+d+'" '+(d===selDate?'selected':'')+'>'+new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'</option>';
    });
    html+='</select></div>';
    html+='<button class="btn btn-sm" onclick="window._exportDailyReport()">⬇ Export CSV</button>';
    html+='</div>';

    if(!selDate){
      html+='<div class="empty-state" style="padding:40px;">Select a date to view the session report</div>';

      html+='<div class="empty-state" style="padding:40px;">No sessions found for '+selDate+'. Make sure table allocations have been set up in the Session planner.</div>';

      var grandPresent=report.slots.reduce(function(t,s){return t+(s.present||0);},0);
      var grandAbsent=report.slots.reduce(function(t,s){return t+(s.absent||0);},0);

      html+='<div class="metric-card" style="flex:1;border-top:3px solid var(--success);"><div class="metric-label">Present</div><div class="metric-value" style="color:var(--success-text);">'+grandPresent+'</div></div>';

function calcHours(sin, sout){
  try{
    const[h1,m1]=sin.split(':').map(Number);
    const[h2,m2]=sout.split(':').map(Number);
    const mins=(h2*60+m2)-(h1*60+m1);
    if(mins<=0)return'—';
    return(mins/60).toFixed(1)+'h';
  }catch(e){return'—';}
}

  ${tab==='accounts'?renderAccountsTab():''}

    ${tab==='payments'?`
  <div class="toolbar">
    <div class="search-wrap"><span class="search-icon">${icoSearch()}</span><input type="text" id="payment-search" placeholder="Search by student name or ID…" style="padding-left:36px;"></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden;"><div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>Student</th><th>ID</th><th>Branch</th><th>Amount</th><th>Method</th><th>Reference</th><th>Recorded by</th><th>Notes</th><th></th></tr></thead>
    <tbody>${payments.map(p=>`<tr>
      <td style="font-family:var(--mono);font-size:12px;">${new Date(p.payment_date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</td>
      <td><strong>${p.student_name}</strong></td>
      <td><span class="id-code">${p.admission_id}</span></td>
      <td><span class="badge badge-accent">${p.branch_name}</span></td>
      <td><strong style="color:var(--success-text);">£${p.amount.toFixed(2)}</strong></td>
      <td>${methodBadge(p.method)}</td>
      <td style="font-family:var(--mono);font-size:12px;color:var(--text3);">${p.reference||'—'}</td>
      <td style="font-size:12px;color:var(--text3);">${p.recorded_by_name||'—'}</td>
      <td style="font-size:12px;color:var(--text3);">${p.notes||'—'}</td>
      <td><div class="row-actions">
        <button class="btn btn-sm" data-action="edit-payment" data-id="${p.id}">Edit</button>
        <button class="btn btn-sm btn-danger" data-action="del-payment" data-id="${p.id}">Del</button>
      </div></td>
    </tr>`).join('')||`<tr><td colspan="10"><div class="empty-state">No payments recorded</div></td></tr>`}</tbody>
  </table></div></div>
  `:''}

  ${tab==='instalments'?`
  <div class="card" style="padding:0;overflow:hidden;"><div class="table-wrap"><table>
    <thead><tr><th>Student</th><th>ID</th><th>Description</th><th>Total</th><th>Paid</th><th>Remaining</th><th>Progress</th><th>Status</th><th></th></tr></thead>
    <tbody>${plans.map(p=>`<tr>
      <td><strong>${p.student_name}</strong></td>
      <td><span class="id-code">${p.admission_id}</span></td>
      <td style="color:var(--text2);">${p.description}</td>
      <td><strong>£${(p.total_amount||0).toFixed(2)}</strong></td>
      <td style="color:var(--success-text);font-weight:500;">£${(p.paid_amount||0).toFixed(2)}</td>
      <td style="color:var(--danger-text);font-weight:500;">£${(p.remaining||0).toFixed(2)}</td>
      <td><div style="display:flex;align-items:center;gap:8px;"><div class="bar-bg" style="width:80px;"><div class="bar-fill" style="width:${p.total_instalments?(p.paid_count/p.total_instalments*100):0}%;background:var(--success);"></div></div><span style="font-size:12px;color:var(--text3);">${p.paid_count||0}/${p.total_instalments||0}</span></div></td>
      <td>${planStatusBadge(p.status)}</td>
      <td><div class="row-actions">
        <button class="btn btn-sm" data-action="view-plan-statement" data-id="${p.student_id}">Statement</button>
        <button class="btn btn-sm btn-danger" data-action="del-instalment-plan" data-id="${p.id}">Delete</button>
      </div></td>
    </tr>`).join('')||`<tr><td colspan="9"><div class="empty-state">No instalment plans</div></td></tr>`}</tbody>
  </table></div></div>
  `:''}`;
}
